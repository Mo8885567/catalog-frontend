    <!-- ═══════════════════════════════════════════════════════
         Tabler Icons — من CDN مباشرة (المشروع ده مستقل ومالوش
         ملف TablerIconsEmbedded.html زي المشروع الأساسي)
         ═══════════════════════════════════════════════════════ -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
    />

    <style>
      /* ===== RESET & VARIABLES ===== */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #f6f8fc;
        --surface: #ffffff;
        --surface2: #f0f4fa;
        --surface3: #e8edf8;
        --border: #e2e8f5;
        --border2: #d0d9ee;
        --text: #0d1526;
        --text2: #4a5778;
        --text3: #8a96b3;
        --primary: #1a56db;
        --primary-dark: #1345b5;
        --primary-soft: #eef3ff;
        --primary-mid: #c7d7fc;
        --success: #0caa6d;
        --success-soft: #e8faf3;
        --success-border: #a7f3d0;
        --warning: #d97706;
        --warning-soft: #fffbeb;
        --warning-border: #fde68a;
        --danger: #dc2626;
        --danger-soft: #fef2f2;
        --accent: #2563eb;
        --gold: #f59e0b;

        --shadow-xs: 0 1px 2px rgba(13, 21, 38, 0.06);
        --shadow-sm:
          0 2px 8px rgba(13, 21, 38, 0.08), 0 1px 3px rgba(13, 21, 38, 0.05);
        --shadow:
          0 6px 20px rgba(13, 21, 38, 0.09), 0 2px 6px rgba(13, 21, 38, 0.05);
        --shadow-md:
          0 12px 32px rgba(13, 21, 38, 0.11), 0 3px 10px rgba(13, 21, 38, 0.06);
        --shadow-lg:
          0 20px 60px rgba(13, 21, 38, 0.14), 0 6px 20px rgba(13, 21, 38, 0.07);
        --shadow-colored: 0 8px 24px rgba(37, 99, 235, 0.22);

        --radius-sm: 10px;
        --radius: 14px;
        --radius-lg: 20px;
        --radius-xl: 28px;
        --font: "IBM Plex Sans Arabic", sans-serif;
        --mono: "JetBrains Mono", monospace;

        --header-h: 68px;
        --sidebar-w: 260px;
        --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);

        /* نسخة RGB من --surface عشان نقدر نستخدمها جوه rgba() في
           الخلفيات الشفافة (هيدر، شريط الموبايل، أزرار فوق الصور)
           فتتلوّن صح مع الوضع الليلي بدل ما تفضل بيضاء ثابتة */
        --surface-rgb: 255, 255, 255;
      }
      /* ============================================================
         الوضع الليلي — نفس أسماء المتغيرات بقيم غامقة، فكل عنصر
         في الصفحة بيتلوّن تلقائي من غير ما نلمس أي CSS تاني
         ============================================================ */
      :root[data-theme="dark"] {
        --surface-rgb: 19, 27, 46;
        --bg: #0b1120;
        --surface: #131b2e;
        --surface2: #1a2338;
        --surface3: #232e48;
        --border: #263349;
        --border2: #303f5c;
        --text: #eef2fb;
        --text2: #aab4cc;
        --text3: #78829e;
        --primary: #4f7fff;
        --primary-dark: #3a63d9;
        --primary-soft: #17223f;
        --primary-mid: #2a3a63;
        --success: #22c58e;
        --success-soft: #102a24;
        --success-border: #1f4b3d;
        --warning: #eab308;
        --warning-soft: #2c2411;
        --warning-border: #4a3d17;
        --danger: #f87171;
        --danger-soft: #2c1618;
        --accent: #4f7fff;
        --gold: #f5b942;

        --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.35);
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.4), 0 1px 3px rgba(0, 0, 0, 0.3);
        --shadow: 0 6px 20px rgba(0, 0, 0, 0.45), 0 2px 6px rgba(0, 0, 0, 0.3);
        --shadow-md:
          0 12px 32px rgba(0, 0, 0, 0.5), 0 3px 10px rgba(0, 0, 0, 0.32);
        --shadow-lg:
          0 20px 60px rgba(0, 0, 0, 0.55), 0 6px 20px rgba(0, 0, 0, 0.35);
        --shadow-colored: 0 8px 24px rgba(79, 127, 255, 0.28);
      }
      /* الصور المنتجات بيضاء الخلفية غالبًا — بنكسر حدتها شوية بالليل
         عشان معينش عين المستخدم */
      :root[data-theme="dark"] .card-img,
      :root[data-theme="dark"] .table-thumb,
      :root[data-theme="dark"] .modal-gallery-main img {
        filter: brightness(0.94) contrast(1.02);
      }
      :root[data-theme="dark"] .mgm-backdrop {
        opacity: 0.5;
      }
      /* شيمر أوضح في الوضع الليلي — الألوان الأساسية قريبة من بعض فمش
         حاسس إن حاجة بتتحمّل، فبنستخدم تباين أعلى مخصوص لليلي */
      :root[data-theme="dark"] .card-img-wrap::before {
        background: linear-gradient(
          100deg,
          #1a2338 30%,
          #34426b 50%,
          #1a2338 70%
        );
        background-size: 200% 100%;
      }
      /* بادچ كود الصنف في الوضع الليلي — خلفيته فاتحة زي النهاري
         (linear-gradient لونها ثابت)، فلو الخط فضل بلون --accent
         الفاتح بيبقى تباينه ضعيف. بنثبته أسود بدل كده. */
      :root[data-theme="dark"] .card-code-badge,
      :root[data-theme="dark"] .modal-code-badge {
        color: #0b1120;
      }

      /* ── Brand skeleton: بديل هادي لحد ما بيانات الشركة توصل، بدل ما
         يظهر اسم افتراضي (MOO.ERP) قبل الاسم الحقيقي بلحظة ── */
      .brand-info.brand-loading #brand-company-name,
      .brand-info.brand-loading #brand-tagline {
        visibility: hidden;
      }
      .brand-info.brand-loading {
        position: relative;
      }
      .brand-info.brand-loading::before,
      .brand-info.brand-loading::after {
        content: "";
        position: absolute;
        right: 0;
        border-radius: 5px;
        background: linear-gradient(
          100deg,
          var(--surface2) 30%,
          var(--surface3, #e2e8f0) 50%,
          var(--surface2) 70%
        );
        background-size: 200% 100%;
        animation: cardImgShimmer 1.4s ease-in-out infinite;
      }
      .brand-info.brand-loading::before {
        top: 2px;
        width: 120px;
        height: 15px;
      }
      .brand-info.brand-loading::after {
        top: 24px;
        width: 90px;
        height: 11px;
      }
      .brand-info {
        transition: opacity 0.3s ease;
      }

      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        font-size: 14px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }

      /* ===== SCROLLBAR ===== */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text3);
      }

      /* ===== HEADER ===== */
      .header {
        position: sticky;
        top: 0;
        z-index: 200;
        background: rgba(var(--surface-rgb), 0.92);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
        height: var(--header-h);
      }
      .header-inner {
        max-width: 100%;
        margin: 0 auto;
        padding: 0 28px;
        height: 100%;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        color: inherit;
        flex-shrink: 0;
      }
      .brand-logo {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: var(--shadow-colored);
        flex-shrink: 0;
        overflow: hidden;
        background: transparent;
      }
      .brand-logo svg {
        width: 42px;
        height: 42px;
        display: block;
        border-radius: 10px;
      }
      .brand-info h1 {
        font-size: 15px;
        font-weight: 800;
        color: var(--text);
        line-height: 1.2;
        letter-spacing: -0.2px;
      }
      .brand-info p {
        font-size: 11px;
        color: var(--text3);
        font-weight: 500;
      }

      /* Search */
      .search-wrap {
        flex: 1;
        max-width: 480px;
        position: relative;
      }
      .search-input {
        width: 100%;
        height: 42px;
        padding: 0 44px 0 16px;
        border: 1.5px solid var(--border2);
        border-radius: 50px;
        background: var(--surface2);
        font-family: var(--font);
        font-size: 13px;
        color: var(--text);
        outline: none;
        transition: all var(--transition);
      }
      .search-input:focus {
        background: var(--surface);
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
      }
      .search-input::placeholder {
        color: var(--text3);
      }
      .search-icon {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text3);
        font-size: 16px;
        pointer-events: none;
        transition: color var(--transition);
      }
      .search-input:focus + .search-icon {
        color: var(--accent);
      }
      .search-clear {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        width: 20px;
        height: 20px;
        background: var(--text3);
        border-radius: 50%;
        border: none;
        color: white;
        font-size: 11px;
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
        transition: background var(--transition);
      }
      .search-clear.visible {
        display: flex;
      }
      .search-clear:hover {
        background: var(--danger);
      }

      /* Header actions */
      .header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-right: auto;
      }
      .theme-toggle-btn {
        width: 38px;
        height: 38px;
        border-radius: var(--radius-sm);
        border: 1.5px solid var(--border);
        background: var(--surface2);
        color: var(--text2);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: all var(--transition);
      }
      .theme-toggle-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--primary-soft);
        transform: translateY(-1px);
      }
      .theme-toggle-btn i {
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .theme-toggle-btn.spin i {
        transform: rotate(180deg);
      }
      /* زرار البحث المخصص للموبايل — مخفي على الديسكتوب لأن مربع
         البحث الكامل ظاهر أصلاً جنب اللوجو */
      .mobile-search-toggle-btn {
        display: none;
        width: 38px;
        height: 38px;
        border-radius: var(--radius-sm);
        border: 1.5px solid var(--border);
        background: var(--surface2);
        color: var(--text2);
        cursor: pointer;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: all var(--transition);
      }
      .mobile-search-toggle-btn:hover,
      .mobile-search-toggle-btn.active {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--primary-soft);
      }
      .view-toggle {
        display: flex;
        background: var(--surface2);
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 3px;
        gap: 2px;
      }
      .view-btn {
        width: 34px;
        height: 30px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--text3);
        font-size: 15px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--transition);
      }
      .view-btn.active {
        background: var(--surface);
        color: var(--accent);
        box-shadow: var(--shadow-xs);
      }
      .view-btn:not(.active):hover {
        color: var(--text2);
      }

      .whatsapp-btn {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 9px 18px;
        background: #25d366;
        color: #fff;
        border: none;
        border-radius: 50px;
        font-family: var(--font);
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        transition: all var(--transition);
        box-shadow: 0 4px 14px rgba(37, 211, 102, 0.35);
        white-space: nowrap;
      }
      .whatsapp-btn:hover {
        background: #1db954;
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(37, 211, 102, 0.45);
      }
      .whatsapp-btn svg {
        flex-shrink: 0;
      }

      /* ===== LAYOUT ===== */
      .layout {
        max-width: 100%;
        margin: 0 auto;
        padding: 0 28px 60px;
        display: flex;
        gap: 24px;
        align-items: flex-start;
      }

      /* ===== SIDEBAR ===== */
      .sidebar {
        width: var(--sidebar-w);
        flex-shrink: 0;
        position: sticky;
        top: calc(var(--header-h) + 24px);
        max-height: calc(100vh - var(--header-h) - 48px);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .sidebar-section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow: var(--shadow-xs);
      }
      .sidebar-title {
        padding: 14px 16px 12px;
        font-size: 11px;
        font-weight: 700;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        border-bottom: 1px solid var(--border);
      }
      .sidebar-items {
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .sidebar-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 9px 10px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        border: none;
        background: transparent;
        font-family: var(--font);
        font-size: 13px;
        font-weight: 500;
        color: var(--text2);
        width: 100%;
        text-align: right;
        transition: all var(--transition);
      }
      .sidebar-item:hover {
        background: var(--surface2);
        color: var(--text);
      }
      .sidebar-item.active {
        background: var(--primary-soft);
        color: var(--primary);
        font-weight: 700;
      }
      .sidebar-item .item-name {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .sidebar-count {
        font-size: 11px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 20px;
        background: var(--surface3);
        color: var(--text3);
        transition: all var(--transition);
      }
      .sidebar-item.active .sidebar-count {
        background: var(--primary-mid);
        color: var(--primary);
      }
      .sidebar-item .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      /* ── Sidebar icon badges (Tabler style — نفس النظام الرئيسي) ── */
      .sidebar-icon-badge {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 15px;
        transition: all var(--transition);
      }
      .sib-blue {
        background: #dbeafe;
        color: #1d4ed8;
      }
      .sib-green {
        background: #d1fae5;
        color: #047857;
      }
      .sib-amber {
        background: #fef3c7;
        color: #b45309;
      }
      .sib-red {
        background: #fee2e2;
        color: #b91c1c;
      }
      .sib-purple {
        background: #ede9fe;
        color: #6d28d9;
      }
      .sib-teal {
        background: #ccfbf1;
        color: #0f766e;
      }
      .sib-gray {
        background: var(--surface3);
        color: var(--text3);
      }

      .sidebar-item.active .sidebar-icon-badge {
        opacity: 1;
      }

      /* Status filter pills — icon upgrade */
      .status-pill .pill-icon {
        font-size: 16px;
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        flex-shrink: 0;
      }
      .pill-icon-all {
        background: #dbeafe;
        color: #1d4ed8;
      }
      .pill-icon-avail {
        background: #d1fae5;
        color: #047857;
      }
      .pill-icon-low {
        background: #fef3c7;
        color: #b45309;
      }
      .pill-icon-out {
        background: #fee2e2;
        color: #b91c1c;
      }

      /* ═══════════════════════════════════════════════════════
         DRAWER — شاشة التفاصيل من اليسار
         ═══════════════════════════════════════════════════════ */
      .drawer-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        z-index: 1000;
        backdrop-filter: blur(3px);
        -webkit-backdrop-filter: blur(3px);
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .drawer-backdrop.open {
        display: block;
        opacity: 1;
      }
      .drawer {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: 520px;
        max-width: 95vw;
        background: var(--surface);
        z-index: 1001;
        display: flex;
        flex-direction: column;
        box-shadow: 6px 0 40px rgba(13, 21, 38, 0.18);
        transform: translateX(-100%);
        transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
        overflow: hidden;
        border-radius: 0 var(--radius-xl) var(--radius-xl) 0;
      }
      .drawer.open {
        transform: translateX(0);
      }
      .drawer-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        gap: 12px;
        background: var(--surface);
        position: sticky;
        top: 0;
        z-index: 5;
      }
      .drawer-header-left {
        display: flex;
        align-items: center;
        gap: 10px;
        flex: 1;
        min-width: 0;
        flex-wrap: wrap;
      }
      .drawer-header h2 {
        font-size: 17px;
        font-weight: 800;
        color: var(--text);
        line-height: 1.3;
        letter-spacing: -0.2px;
      }
      .drawer-close {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1.5px solid var(--border);
        background: var(--surface2);
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text3);
        transition: all var(--transition);
        flex-shrink: 0;
      }
      .drawer-close:hover {
        background: var(--danger-soft);
        border-color: var(--danger);
        color: var(--danger);
      }
      .drawer-body {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-width: thin;
        scrollbar-color: var(--border2) transparent;
        display: flex;
        flex-direction: column;
      }
      .drawer-body::-webkit-scrollbar {
        width: 5px;
      }
      .drawer-body::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 10px;
      }
      .status-pills {
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .status-pill {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: var(--radius-sm);
        border: 1.5px solid var(--border);
        background: transparent;
        font-family: var(--font);
        font-size: 12px;
        font-weight: 600;
        color: var(--text2);
        cursor: pointer;
        transition: all var(--transition);
        width: 100%;
        text-align: right;
      }
      .status-pill:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--primary-soft);
      }
      .status-pill.active-all {
        border-color: var(--accent);
        background: var(--primary-soft);
        color: var(--accent);
      }
      .status-pill.active-avail {
        border-color: var(--success);
        background: var(--success-soft);
        color: var(--success);
      }
      .status-pill.active-low {
        border-color: var(--warning);
        background: var(--warning-soft);
        color: var(--warning);
      }
      .status-pill .pill-icon {
        font-size: 16px;
      }
      .status-pill .pill-label {
        flex: 1;
      }
      .status-pill .pill-count {
        font-size: 11px;
        font-weight: 700;
      }

      /* Stats card */
      .stats-card {
        background: linear-gradient(135deg, #1a56db 0%, #3b82f6 100%);
        border-radius: var(--radius-lg);
        padding: 20px;
        color: #fff;
        position: relative;
        overflow: hidden;
        box-shadow: var(--shadow-colored);
      }
      .stats-card::before {
        content: "";
        position: absolute;
        top: -30px;
        left: -30px;
        width: 120px;
        height: 120px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 50%;
      }
      .stats-card::after {
        content: "";
        position: absolute;
        bottom: -20px;
        right: -10px;
        width: 80px;
        height: 80px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 50%;
      }
      .stats-card-title {
        font-size: 11px;
        font-weight: 600;
        opacity: 0.75;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 12px;
        position: relative;
      }
      .stats-row {
        display: flex;
        gap: 0;
        position: relative;
      }
      .stat-item {
        flex: 1;
        text-align: center;
      }
      .stat-item + .stat-item {
        border-right: 1px solid rgba(255, 255, 255, 0.2);
      }
      .stat-num {
        font-size: 22px;
        font-weight: 800;
        line-height: 1;
        margin-bottom: 4px;
      }
      .stat-lbl {
        font-size: 10px;
        opacity: 0.75;
        font-weight: 500;
      }

      /* ===== MAIN CONTENT ===== */
      .main-content {
        flex: 1;
        min-width: 0;
        padding-top: 24px;
      }

      /* Results header */
      .results-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
        gap: 12px;
        flex-wrap: wrap;
      }
      .results-info {
        font-size: 13px;
        color: var(--text2);
        font-weight: 500;
      }
      .results-info b {
        color: var(--text);
        font-weight: 700;
      }
      .results-sort {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--text3);
      }
      .results-sort select {
        padding: 6px 10px;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        font-family: var(--font);
        font-size: 12px;
        color: var(--text2);
        background: var(--surface);
        cursor: pointer;
        outline: none;
      }

      /* ===== GROUP HEADER ===== */
      .group-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 32px 0 14px;
      }
      .group-header:first-child {
        margin-top: 0;
      }
      .group-icon {
        width: 36px;
        height: 36px;
        background: var(--primary-soft);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 17px;
        flex-shrink: 0;
      }
      .group-title {
        font-size: 16px;
        font-weight: 800;
        color: var(--text);
        letter-spacing: -0.2px;
      }
      .group-badge {
        background: var(--primary-soft);
        color: var(--primary);
        font-size: 11px;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 20px;
      }
      .group-line {
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      /* ===== CARDS GRID ===== */
      .cards-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 16px;
      }
      .cards-grid.grid-compact {
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: 12px;
      }

      /* ===== PRODUCT CARD ===== */
      .card {
        background: var(--surface);
        border-radius: var(--radius-lg);
        border: 1px solid var(--border);
        overflow: hidden;
        box-shadow: var(--shadow-sm);
        transition:
          transform var(--transition),
          box-shadow var(--transition),
          border-color var(--transition);
        cursor: pointer;
        display: flex;
        flex-direction: column;
        position: relative;
      }
      .card:hover {
        transform: translateY(-5px);
        box-shadow: var(--shadow-md);
        border-color: var(--primary-mid);
      }

      /* Card image */
      .card-img-wrap {
        position: relative;
        width: 100%;
        padding-top: 75%; /* مستطيل 4:3 بدل الصندوق الطولي القديم */
        background: var(--surface2);
        overflow: hidden;
        flex-shrink: 0;
      }
      /* شيمر لطيف بيلمع فوق خلفية الكارت لحد ما الصورة توصل، بدل
         مربع فاضي ساكن — بيدّي إحساس إن حاجة بتتحمّل فعليًا */
      .card-img-wrap::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          100deg,
          var(--surface2) 30%,
          var(--surface3, #e2e8f0) 50%,
          var(--surface2) 70%
        );
        background-size: 200% 100%;
        animation: cardImgShimmer 1.4s ease-in-out infinite;
      }
      .card-img-wrap:has(.card-img.loaded)::before,
      .card-img-wrap:has(.card-img-ph)::before {
        display: none;
      }
      @keyframes cardImgShimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
      .card-img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain; /* تعرض الصورة كاملة من غير قص، أيًا كانت أبعادها */
        opacity: 0;
        transition:
          transform 0.5s cubic-bezier(0.4, 0, 0.2, 1),
          opacity 0.35s ease;
      }
      .card-img.loaded {
        opacity: 1;
      }
      .card:hover .card-img {
        transform: scale(1.08);
      }
      .card-img-ph {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 8px;
        color: var(--text3);
      }
      .card-img-ph .ph-icon {
        font-size: 40px;
        opacity: 0.5;
      }
      .card-img-ph .ph-text {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      /* Card status badge */
      .card-status {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 1;
      }

      /* Card overlay on hover */
      .card-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(13, 21, 38, 0.7) 0%,
          transparent 60%
        );
        opacity: 0;
        transition: opacity var(--transition);
        display: flex;
        align-items: flex-end;
        padding: 14px;
      }
      .card:hover .card-overlay {
        opacity: 1;
      }
      .card-overlay-btn {
        width: 100%;
        padding: 9px;
        background: rgba(255, 255, 255, 0.95);
        color: var(--primary);
        border: none;
        border-radius: var(--radius-sm);
        font-family: var(--font);
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: background var(--transition);
        backdrop-filter: blur(8px);
      }
      .card-overlay-btn:hover {
        background: #fff;
      }

      /* Card body */
      .card-body {
        padding: 14px;
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .card-id {
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 700;
        color: var(--accent);
        background: var(--primary-soft);
        padding: 2px 7px;
        border-radius: 6px;
        width: fit-content;
        letter-spacing: 0.5px;
        border: 1px solid var(--primary-mid);
        display: none; /* hidden now — shown inline next to name */
      }
      /* ── Inline name + code row ── */
      .card-name-row {
        display: flex;
        align-items: flex-start;
        gap: 7px;
        flex-wrap: wrap;
      }
      .card-name {
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.35;
        letter-spacing: -0.1px;
        flex: 1;
        min-width: 0;
      }
      .card-code-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 700;
        color: var(--accent);
        background: linear-gradient(
          135deg,
          var(--primary-soft) 0%,
          #dbeafe 100%
        );
        border: 1.5px solid var(--primary-mid);
        padding: 3px 8px;
        border-radius: 20px;
        letter-spacing: 0.4px;
        white-space: nowrap;
        flex-shrink: 0;
        box-shadow: 0 1px 4px rgba(37, 99, 235, 0.1);
        transition: all var(--transition);
        margin-top: 1px;
        cursor: default;
      }
      .card-code-badge::before {
        content: "#";
        opacity: 0.55;
        font-size: 9px;
      }
      .card:hover .card-code-badge {
        background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
        border-color: var(--accent);
        box-shadow: 0 2px 8px rgba(37, 99, 235, 0.18);
      }
      .card-desc {
        font-size: 12px;
        color: var(--text3);
        line-height: 1.55;
        flex: 1;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .card-group {
        font-size: 11px;
        color: var(--text3);
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .card-group::before {
        content: "";
        display: inline-block;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--border2);
      }

      /* Colors */
      .card-colors {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 2px;
      }
      .color-dot {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 2.5px solid white;
        box-shadow:
          0 0 0 1.5px rgba(0, 0, 0, 0.12),
          var(--shadow-xs);
        cursor: pointer;
        position: relative;
        transition:
          transform var(--transition),
          box-shadow var(--transition);
        flex-shrink: 0;
      }
      .color-dot:hover {
        transform: scale(1.35);
        z-index: 2;
        box-shadow:
          0 0 0 2.5px var(--accent),
          var(--shadow-sm);
      }
      .color-dot.active-dot {
        transform: scale(1.35);
        box-shadow:
          0 0 0 2.5px var(--accent),
          var(--shadow-sm);
        z-index: 2;
      }
      .color-dot[title]:hover::after {
        content: attr(title);
        position: absolute;
        bottom: calc(100% + 6px);
        left: 50%;
        transform: translateX(-50%);
        background: #0d1526;
        color: #fff;
        font-size: 10px;
        padding: 4px 8px;
        border-radius: 7px;
        white-space: nowrap;
        pointer-events: none;
        z-index: 20;
        font-family: var(--font);
        font-weight: 600;
        box-shadow: var(--shadow-sm);
      }
      .colors-more {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--surface3);
        border: 2px solid white;
        box-shadow: 0 0 0 1.5px rgba(0, 0, 0, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 8px;
        font-weight: 700;
        color: var(--text3);
      }

      /* ── Color preview overlay on card image ── */
      .card-img-wrap {
        isolation: isolate;
      }

      .card-color-preview {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: var(--surface2);
        opacity: 0;
        pointer-events: none;
        z-index: 3;
        border-radius: 0;
        /* slide-up reveal */
        transform: translateY(12px) scale(1.04);
        transition:
          opacity 0.32s cubic-bezier(0.4, 0, 0.2, 1),
          transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .card-color-preview.show {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      /* color name tag that appears on preview */
      .card-color-tag {
        position: absolute;
        bottom: 10px;
        left: 10px;
        z-index: 4;
        background: rgba(13, 21, 38, 0.72);
        color: #fff;
        font-size: 11px;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 20px;
        backdrop-filter: blur(8px);
        opacity: 0;
        transform: translateY(6px);
        transition:
          opacity 0.28s 0.08s cubic-bezier(0.4, 0, 0.2, 1),
          transform 0.28s 0.08s cubic-bezier(0.4, 0, 0.2, 1);
        pointer-events: none;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .card-color-tag.show {
        opacity: 1;
        transform: translateY(0);
      }
      .card-color-tag-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        flex-shrink: 0;
        border: 1.5px solid rgba(255, 255, 255, 0.5);
      }

      /* Price */
      .card-price {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        background: var(--warning-soft);
        border: 1px solid var(--warning-border);
        border-radius: 8px;
        padding: 4px 10px;
        font-size: 13px;
        font-weight: 800;
        color: #92400e;
        margin-top: 4px;
        width: fit-content;
      }

      /* Card footer */
      .card-footer {
        padding: 10px 14px 14px;
        display: flex;
        gap: 8px;
      }
      .btn-order {
        flex: 1;
        padding: 9px 12px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: var(--radius-sm);
        font-family: var(--font);
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        transition: all var(--transition);
        box-shadow: 0 3px 10px rgba(37, 99, 235, 0.25);
      }
      .btn-order:hover {
        background: var(--primary-dark);
        transform: translateY(-1px);
        box-shadow: 0 5px 16px rgba(37, 99, 235, 0.35);
      }
      .btn-order:disabled {
        background: var(--surface3);
        color: var(--text3);
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }
      /* ✅ بديل disabled يسمح بالـ onclick ويعرض رسالة */
      .btn-order-disabled {
        background: var(--surface3) !important;
        color: var(--text3) !important;
        cursor: not-allowed !important;
        transform: none !important;
        box-shadow: none !important;
        opacity: 0.7;
      }
      .btn-order-disabled:hover {
        background: var(--surface3) !important;
        transform: none !important;
        box-shadow: none !important;
      }
      .btn-details {
        width: 38px;
        height: 38px;
        border: 1.5px solid var(--border2);
        border-radius: var(--radius-sm);
        background: var(--surface2);
        font-size: 15px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--transition);
        flex-shrink: 0;
        color: var(--text2);
      }
      .btn-details:hover {
        background: var(--primary-soft);
        border-color: var(--accent);
        color: var(--accent);
      }

      /* ===== BADGES ===== */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 700;
        white-space: nowrap;
        backdrop-filter: blur(8px);
      }
      .badge-avail {
        background: rgba(12, 170, 109, 0.15);
        color: #065f46;
        border: 1px solid rgba(12, 170, 109, 0.3);
      }
      .badge-low {
        background: rgba(217, 119, 6, 0.15);
        color: #92400e;
        border: 1px solid rgba(217, 119, 6, 0.3);
      }
      .badge-out {
        background: rgba(220, 38, 38, 0.15);
        color: #991b1b;
        border: 1px solid rgba(220, 38, 38, 0.3);
      }

      /* ===== TABLE VIEW ===== */
      .table-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        box-shadow: var(--shadow-sm);
        width: 100%;
        max-width: 100%;
      }
      .data-table {
        width: 100%;
        min-width: 600px;
        border-collapse: collapse;
      }
      .data-table thead th {
        padding: 12px 16px;
        font-size: 11px;
        font-weight: 700;
        color: var(--text3);
        text-align: right;
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
        text-transform: uppercase;
        letter-spacing: 0.6px;
      }
      .data-table tbody td {
        padding: 13px 16px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        color: var(--text);
        vertical-align: middle;
      }
      .data-table tbody tr:last-child td {
        border-bottom: none;
      }
      .data-table tbody tr {
        cursor: pointer;
        transition: background var(--transition);
      }
      .data-table tbody tr:hover {
        background: var(--surface2);
      }
      .table-thumb {
        width: 44px;
        height: 44px;
        object-fit: cover;
        border-radius: 10px;
        border: 1px solid var(--border);
        display: block;
      }
      .table-thumb-ph {
        width: 44px;
        height: 44px;
        background: var(--surface3);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }
      .table-name {
        font-weight: 700;
        color: var(--text);
      }
      .table-sub {
        font-size: 11px;
        color: var(--text3);
        margin-top: 2px;
      }

      /* ===== MODAL ===== */
      .modal-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        padding: 20px;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
      }
      .modal-backdrop.open {
        display: flex;
      }
      .modal {
        background: var(--surface);
        border-radius: var(--radius-xl);
        width: 100%;
        max-width: 720px;
        max-height: 92vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        box-shadow: var(--shadow-lg);
        animation: slideUp 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }
      /* modal-inner يأخذ flex:1 ويسكرول */
      #modal-inner {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        /* custom scrollbar */
        scrollbar-width: thin;
        scrollbar-color: var(--border2) transparent;
      }
      #modal-inner::-webkit-scrollbar {
        width: 5px;
      }
      #modal-inner::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 10px;
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(24px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 22px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        gap: 12px;
        position: sticky;
        top: 0;
        background: var(--surface);
        z-index: 10;
      }
      .modal-header h2 {
        font-size: 17px;
        font-weight: 800;
        color: var(--text);
        line-height: 1.3;
        letter-spacing: -0.2px;
      }
      .modal-code-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 700;
        color: var(--accent);
        background: linear-gradient(
          135deg,
          var(--primary-soft) 0%,
          #dbeafe 100%
        );
        border: 1.5px solid var(--primary-mid);
        padding: 4px 10px;
        border-radius: 20px;
        letter-spacing: 0.5px;
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
        box-shadow: 0 1px 4px rgba(37, 99, 235, 0.12);
        transition: all var(--transition);
        user-select: none;
      }
      .modal-code-badge:hover {
        background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
        border-color: var(--accent);
        box-shadow: 0 2px 10px rgba(37, 99, 235, 0.22);
        transform: scale(1.04);
      }
      .modal-code-badge:active {
        transform: scale(0.97);
      }
      .modal-close {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1.5px solid var(--border);
        background: var(--surface2);
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text3);
        transition: all var(--transition);
        flex-shrink: 0;
      }
      .modal-close:hover {
        background: var(--danger-soft);
        border-color: var(--danger);
        color: var(--danger);
      }
      .modal-body {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      /* ── Image Gallery ── */
      .modal-gallery {
        position: relative;
        background: var(--surface2);
        overflow: hidden;
        flex-shrink: 0;
      }
      .modal-gallery-main {
        position: relative;
        width: 100%;
        padding-top: 68%;
        cursor: zoom-in;
        overflow: hidden;
        background: var(--surface2);
      }
      /* blurred, zoomed copy of the current photo fills the frame behind it,
         so images of any ratio (portrait/landscape/square) never look like
         they're floating on an empty rectangle */
      .mgm-backdrop {
        position: absolute;
        inset: -24px;
        background-size: cover;
        background-position: center;
        filter: blur(28px) saturate(1.15) brightness(0.92);
        transform: scale(1.15);
        opacity: 0;
        transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .mgm-backdrop.active {
        opacity: 0.65;
      }
      /* two stacked <img> layers crossfade between each other so a new
         image never "pops" in — the old one fades out while the new one
         (already fully loaded) fades in at the same time */
      .modal-gallery-main img.mgm-img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
        opacity: 0;
        transform: scale(1.015);
        transition:
          opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1),
          transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: opacity, transform;
        z-index: 1;
      }
      .modal-gallery-main img.mgm-img.active {
        opacity: 1;
        transform: scale(1);
        z-index: 2;
      }
      .modal-gallery-main .modal-img-ph {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .modal-gallery-main:hover img.mgm-img.active {
        transform: scale(1.035);
      }
      .modal-img-ph {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 72px;
        color: var(--border2);
        cursor: default;
      }
      /* zoom hint overlay */
      .modal-zoom-hint {
        position: absolute;
        bottom: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.45);
        color: #fff;
        font-size: 11px;
        font-weight: 600;
        padding: 4px 10px;
        border-radius: 20px;
        backdrop-filter: blur(6px);
        pointer-events: none;
        opacity: 0;
        transition: opacity var(--transition);
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .modal-gallery-main:hover .modal-zoom-hint {
        opacity: 1;
      }

      /* gallery nav arrows (prev/next) */
      .gallery-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: none;
        background: rgba(0, 0, 0, 0.4);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 3;
        backdrop-filter: blur(4px);
        transition:
          background var(--transition),
          transform var(--transition);
        opacity: 0;
      }
      .modal-gallery-main:hover .gallery-arrow {
        opacity: 1;
      }
      .gallery-arrow:hover {
        background: rgba(0, 0, 0, 0.65);
        transform: translateY(-50%) scale(1.08);
      }
      .gallery-arrow-prev {
        right: 10px;
      }
      .gallery-arrow-next {
        left: 10px;
      }
      .gallery-arrow i {
        font-size: 18px;
      }

      /* gallery dot indicators */
      .gallery-dots {
        position: absolute;
        bottom: 10px;
        right: 50%;
        transform: translateX(50%);
        display: flex;
        gap: 6px;
        z-index: 3;
      }
      .gallery-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.55);
        border: none;
        padding: 0;
        cursor: pointer;
        transition: all var(--transition);
      }
      .gallery-dot.active {
        background: #fff;
        width: 18px;
        border-radius: 4px;
      }

      /* image counter badge (e.g. 2/4) */
      .gallery-counter {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.45);
        color: #fff;
        font-size: 11px;
        font-weight: 600;
        padding: 3px 9px;
        border-radius: 20px;
        backdrop-filter: blur(6px);
        z-index: 3;
        pointer-events: none;
      }

      /* thumbnails strip */
      .modal-thumbs {
        display: flex;
        gap: 8px;
        padding: 10px 14px;
        overflow-x: auto;
        background: var(--surface);
        border-top: 1px solid var(--border);
        scroll-snap-type: x mandatory;
      }
      .modal-thumbs::-webkit-scrollbar {
        height: 4px;
      }
      .modal-thumb {
        width: 56px;
        height: 56px;
        flex-shrink: 0;
        border-radius: 10px;
        overflow: hidden;
        border: 2.5px solid var(--border);
        cursor: pointer;
        transition: all var(--transition);
        scroll-snap-align: start;
        position: relative;
      }
      .modal-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .modal-thumb-color {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 2px;
        font-size: 9px;
        font-weight: 700;
        color: rgba(0, 0, 0, 0.55);
        padding: 3px;
        text-align: center;
        line-height: 1.2;
      }
      .modal-thumb:hover {
        border-color: var(--accent);
        transform: scale(1.06);
      }
      .modal-thumb.active {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.22);
      }
      .modal-thumb.color-group:not(.active) {
        border-color: var(--accent);
        opacity: 1;
      }
      .modal-thumb-label {
        font-size: 9px;
        font-weight: 700;
        color: var(--text2);
        text-align: center;
        margin-top: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 56px;
      }
      .modal-thumb-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* ── Lightbox ── */
      .lightbox {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.92);
        z-index: 2000;
        align-items: center;
        justify-content: center;
        padding: 20px;
        cursor: zoom-out;
        backdrop-filter: blur(8px);
      }
      .lightbox.open {
        display: flex;
      }
      .lightbox img {
        max-width: 90vw;
        max-height: 88vh;
        object-fit: contain;
        border-radius: 14px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
        animation: lbIn 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }
      @keyframes lbIn {
        from {
          opacity: 0;
          transform: scale(0.92);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .lightbox-close {
        position: absolute;
        top: 16px;
        left: 16px;
        width: 40px;
        height: 40px;
        background: rgba(255, 255, 255, 0.12);
        border: 1.5px solid rgba(255, 255, 255, 0.25);
        border-radius: 50%;
        color: #fff;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition);
      }
      .lightbox-close:hover {
        background: rgba(220, 38, 38, 0.6);
      }

      /* modal content */
      .modal-content {
        padding: 22px 24px;
      }
      .modal-meta-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 18px;
      }
      .modal-meta-item {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 14px;
      }
      .modal-meta-item .m-label {
        font-size: 10px;
        font-weight: 700;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.7px;
        margin-bottom: 4px;
      }
      .modal-meta-item .m-val {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
      }
      .modal-meta-item .m-val.mono {
        font-family: var(--mono);
        color: var(--accent);
        font-size: 14px;
      }

      .modal-section-title {
        font-size: 13px;
        font-weight: 700;
        color: var(--text2);
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      /* ── Interactive Color Picker ── */
      .modal-colors-wrap {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 20px;
      }
      .modal-color-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        cursor: pointer;
        padding: 6px 8px;
        border-radius: 12px;
        border: 2px solid transparent;
        background: var(--surface2);
        transition: all var(--transition);
        min-width: 64px;
        text-align: center;
      }
      .modal-color-card:hover {
        border-color: var(--accent);
        background: var(--primary-soft);
        transform: translateY(-2px);
        box-shadow: var(--shadow-sm);
      }
      .modal-color-card.selected {
        border-color: var(--accent);
        background: var(--primary-soft);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.18);
      }
      .modal-color-card.selected .mcv-swatch {
        animation: mcvPop 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes mcvPop {
        0% {
          transform: scale(0.85);
        }
        60% {
          transform: scale(1.08);
        }
        100% {
          transform: scale(1);
        }
      }
      .modal-color-card.selected .mcv-check {
        display: flex;
      }
      .mcv-check {
        animation: mcvCheckIn 0.22s ease;
      }
      @keyframes mcvCheckIn {
        from {
          opacity: 0;
          transform: scale(0.6);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .mcv-swatch-wrap {
        position: relative;
        width: 36px;
        height: 36px;
      }
      .mcv-swatch {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 3px solid white;
        box-shadow:
          0 0 0 1.5px rgba(0, 0, 0, 0.12),
          var(--shadow-xs);
        overflow: hidden;
        flex-shrink: 0;
      }
      .mcv-swatch img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
      }
      .mcv-check {
        display: none;
        position: absolute;
        inset: 0;
        align-items: center;
        justify-content: center;
        background: rgba(37, 99, 235, 0.7);
        border-radius: 50%;
        color: #fff;
        font-size: 15px;
        font-weight: 800;
      }
      .mcv-name {
        font-size: 10px;
        font-weight: 700;
        color: var(--text2);
        line-height: 1.2;
        max-width: 64px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .modal-color-card.selected .mcv-name {
        color: var(--accent);
      }

      /* selected color indicator */
      .modal-selected-color {
        display: none;
        align-items: center;
        gap: 8px;
        background: var(--primary-soft);
        border: 1px solid var(--primary-mid);
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 700;
        color: var(--primary);
        margin-bottom: 16px;
      }
      .modal-selected-color.visible {
        display: flex;
      }
      .modal-color-swatch {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 2px solid white;
        box-shadow: 0 0 0 1.5px rgba(0, 0, 0, 0.12);
        flex-shrink: 0;
      }

      /* Order section */
      .modal-order {
        background: linear-gradient(135deg, #ecfdf5, #d1fae5);
        border: 1px solid var(--success-border);
        border-radius: var(--radius-lg);
        padding: 20px;
        margin-top: 20px;
      }
      .modal-order h4 {
        font-size: 14px;
        font-weight: 800;
        color: #065f46;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .order-row {
        display: grid;
        grid-template-columns: auto 1fr auto 1fr;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }
      .order-label {
        font-size: 12px;
        font-weight: 600;
        color: #065f46;
        white-space: nowrap;
      }
      .order-input,
      .order-select {
        padding: 9px 12px;
        border: 1.5px solid var(--success-border);
        border-radius: var(--radius-sm);
        font-family: var(--font);
        font-size: 13px;
        background: rgba(var(--surface-rgb), 0.8);
        color: var(--text);
        outline: none;
        transition: border-color var(--transition);
      }
      .order-input:focus,
      .order-select:focus {
        border-color: var(--success);
        box-shadow: 0 0 0 3px rgba(12, 170, 109, 0.12);
      }
      .order-input[type="number"] {
        width: 90px;
      }
      /* ── سبينر مخصص للكمية: زرار ناقص + حقل + زرار زائد ──
         بيحل محل أسهم المتصفح الافتراضية اللي مش دايمًا واضحة
         وبتزيد/بتنقص بمقدار 1 فقط بدل مضاعف الطقم الفعلي */
      .qty-stepper {
        display: flex;
        align-items: stretch;
        border: 1.5px solid var(--success-border);
        border-radius: var(--radius-sm);
        overflow: hidden;
        background: rgba(var(--surface-rgb), 0.8);
      }
      .qty-step-btn {
        width: 34px;
        border: none;
        background: transparent;
        color: #065f46;
        font-size: 18px;
        font-weight: 800;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition);
        user-select: none;
      }
      .qty-step-btn:hover {
        background: rgba(12, 170, 109, 0.14);
      }
      .qty-step-btn:active {
        background: rgba(12, 170, 109, 0.28);
      }
      .qty-stepper .qty-input {
        width: 56px;
        border: none;
        border-radius: 0;
        border-inline: 1.5px solid var(--success-border);
        text-align: center;
        background: transparent;
      }
      .qty-stepper .qty-input:focus {
        box-shadow: none;
      }
      /* إخفاء أسهم المتصفح الافتراضية بتاعة type=number — بنستخدم
         الأزرار المخصصة بدلها لأنها بتحترم مضاعف الطقم بشكل صحيح */
      .qty-input::-webkit-outer-spin-button,
      .qty-input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .qty-input[type="number"] {
        -moz-appearance: textfield;
      }
      .btn-whatsapp {
        width: 100%;
        padding: 13px;
        background: #25d366;
        color: #fff;
        border: none;
        border-radius: var(--radius);
        font-family: var(--font);
        font-size: 15px;
        font-weight: 800;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: all var(--transition);
        box-shadow: 0 4px 16px rgba(37, 211, 102, 0.35);
        letter-spacing: -0.2px;
      }
      .btn-whatsapp:hover {
        background: #1db954;
        transform: translateY(-1px);
        box-shadow: 0 6px 24px rgba(37, 211, 102, 0.45);
      }

      /* ===== LOADING ===== */
      /* ===== PREMIUM LOADER ===== */
      .loading-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px 24px;
        gap: 0;
      }

      /* الحلقات الدوّارة */
      .loader-rings {
        position: relative;
        width: 80px;
        height: 80px;
        margin-bottom: 32px;
      }
      .loader-rings::before,
      .loader-rings::after,
      .loader-ring-inner {
        content: "";
        position: absolute;
        border-radius: 50%;
        border: 3px solid transparent;
      }
      /* الحلقة الخارجية */
      .loader-rings::before {
        inset: 0;
        border-top-color: var(--accent);
        border-right-color: var(--primary-mid);
        animation: ringSpin 1.1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      /* الحلقة الوسطى */
      .loader-ring-inner {
        inset: 10px;
        border-bottom-color: var(--accent);
        border-left-color: var(--primary-mid);
        opacity: 0.7;
        animation: ringSpin 0.85s cubic-bezier(0.4, 0, 0.2, 1) infinite reverse;
      }
      /* الحلقة الداخلية */
      .loader-rings::after {
        inset: 22px;
        border-top-color: var(--primary-dark);
        animation: ringSpin 0.6s linear infinite;
      }
      /* النقطة المركزية */
      .loader-dot {
        position: absolute;
        inset: 34px;
        background: linear-gradient(135deg, var(--accent), var(--primary-dark));
        border-radius: 50%;
        animation: dotPulse 1.1s ease-in-out infinite;
        box-shadow: 0 0 12px rgba(37, 99, 235, 0.5);
      }

      @keyframes ringSpin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes dotPulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(0.7);
          opacity: 0.6;
        }
      }

      /* النص */
      .loading-text {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.2px;
        animation: textFade 1.8s ease-in-out infinite;
      }
      .loading-sub {
        font-size: 12px;
        color: var(--text3);
        margin-top: 6px;
        font-weight: 500;
      }
      /* شريط التقدم */
      .loader-bar-wrap {
        width: 160px;
        height: 3px;
        background: var(--surface3);
        border-radius: 10px;
        margin-top: 20px;
        overflow: hidden;
      }
      .loader-bar {
        height: 100%;
        width: 40%;
        background: linear-gradient(
          90deg,
          var(--accent),
          #60a5fa,
          var(--accent)
        );
        background-size: 200% 100%;
        border-radius: 10px;
        animation:
          barSlide 1.4s ease-in-out infinite,
          barShimmer 1.4s linear infinite;
      }
      @keyframes barSlide {
        0% {
          transform: translateX(300%);
        }
        100% {
          transform: translateX(-300%);
        }
      }
      @keyframes barShimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
      @keyframes textFade {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.55;
        }
      }

      /* إخفاء القديم */
      .spinner {
        display: none;
      }

      /* ===== EMPTY ===== */
      .empty-wrap {
        text-align: center;
        padding: 80px 24px;
        color: var(--text3);
      }
      .empty-icon {
        font-size: 64px;
        margin-bottom: 16px;
        opacity: 0.6;
      }
      .empty-wrap h3 {
        font-size: 18px;
        font-weight: 800;
        color: var(--text2);
        margin-bottom: 6px;
      }
      .empty-wrap p {
        font-size: 13px;
      }

      /* ===== ERROR ===== */
      .error-wrap {
        background: var(--danger-soft);
        border: 1px solid #fca5a5;
        border-radius: var(--radius-lg);
        padding: 32px;
        text-align: center;
        color: var(--danger);
      }

      /* ===== TOAST ===== */
      .toast {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%) translateY(80px);
        background: #0d1526;
        color: #fff;
        padding: 11px 22px;
        border-radius: 50px;
        font-size: 13px;
        font-weight: 600;
        z-index: 3000;
        transition:
          transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
          opacity 0.3s;
        opacity: 0;
        pointer-events: none;
        white-space: nowrap;
        box-shadow: var(--shadow-lg);
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      /* ===== MOBILE FILTERS TOGGLE ===== */
      .mobile-filter-btn {
        display: none;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: 50px;
        font-family: var(--font);
        font-size: 13px;
        font-weight: 600;
        color: var(--text2);
        cursor: pointer;
        transition: all var(--transition);
        white-space: nowrap;
      }
      .mobile-filter-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .mobile-filter-btn.filter-active {
        background: var(--primary-soft);
        border-color: var(--accent);
        color: var(--accent);
      }

      /* ── Active filter chip bar (mobile) ── */
      .active-filter-bar {
        display: none;
        align-items: center;
        gap: 8px;
        padding: 0 0 12px;
        flex-wrap: wrap;
      }
      .active-filter-bar.visible {
        display: flex;
      }
      .active-filter-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 12px;
        border-radius: 50px;
        font-size: 12px;
        font-weight: 700;
        background: var(--primary-soft);
        color: var(--primary);
        border: 1.5px solid var(--primary-mid);
        cursor: pointer;
        transition: all var(--transition);
      }
      .active-filter-chip:hover {
        background: var(--danger-soft);
        border-color: var(--danger);
        color: var(--danger);
      }

      /* ===== RESPONSIVE ===== */

      /* ── Large Desktop (1280px+): wider grid ── */
      @media (min-width: 1280px) {
        .cards-grid {
          grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        }
      }

      /* ── Tablet landscape / small desktop (1024px) ── */
      @media (max-width: 1024px) {
        :root {
          --sidebar-w: 210px;
        }
        .cards-grid {
          grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
          gap: 14px;
        }
      }

      /* ── Tablet portrait (768–1023px) ── */
      @media (max-width: 1023px) and (min-width: 769px) {
        :root {
          --header-h: 62px;
        }
        .layout {
          padding: 0 20px 60px;
        }
        .cards-grid {
          grid-template-columns: repeat(3, 1fr);
          gap: 14px;
        }
        .card-name {
          font-size: 13px;
        }
        .card-body {
          padding: 12px;
        }
        .card-footer {
          padding: 8px 12px 12px;
        }
        .btn-order {
          font-size: 11px;
          padding: 8px 10px;
        }
        .btn-details {
          width: 34px;
          height: 34px;
          font-size: 13px;
        }
        /* Stats card يصبح أفقياً ويتمدد */
        .stats-card {
          padding: 16px;
        }
        .stat-num {
          font-size: 19px;
        }
      }

      /* ══════════════════════════════════════════════════════
         MOBILE — ≤768px
         الـ sidebar يختفي تماماً والكروت تملأ الشاشة
         ══════════════════════════════════════════════════════ */
      @media (max-width: 768px) {
        :root {
          --header-h: 56px;
        }

        /* ── Header ── */
        .header-inner {
          padding: 0 12px;
          gap: 8px;
        }
        .brand-info {
          display: none;
        }
        .view-toggle {
          display: none;
        }
        .whatsapp-btn span {
          display: none;
        }
        .whatsapp-btn {
          padding: 9px 12px;
          min-width: 44px;
          min-height: 44px;
        }
        /* البحث بقى زرار أيقونة بس بدل صندوق مضغوط بيبين نص مقطوع —
           بيتفتح كشريط كامل العرض تحت الهيدر لما تدوس عليه */
        .mobile-search-toggle-btn {
          display: flex;
        }
        .search-wrap {
          display: none;
          position: absolute;
          top: 100%;
          right: 0;
          left: 0;
          max-width: none;
          padding: 10px 12px;
          background: var(--surface);
          border-bottom: 1px solid var(--border);
          box-shadow: 0 10px 26px rgba(13, 21, 38, 0.14);
          z-index: 250;
        }
        .search-wrap.mobile-search-open {
          display: flex;
        }
        .mobile-filter-btn {
          display: flex;
        }
        .cart-btn {
          padding: 8px 12px;
        }

        /* ── Layout: كتلة واحدة — الـ sidebar خارج التدفق تماماً ── */
        .layout {
          display: block !important;
          padding: 0 14px 120px !important;
          gap: 0 !important;
        }

        /* ── Sidebar: مخفي — يظهر كـ overlay فقط عند الضغط ── */
        .sidebar {
          display: none !important;
          position: fixed !important;
          top: var(--header-h) !important;
          right: 0 !important;
          left: 0 !important;
          bottom: auto !important;
          width: 100% !important;
          max-height: 78vh !important;
          z-index: 600 !important;
          background: var(--surface) !important;
          padding: 16px !important;
          overflow-y: auto !important;
          border-bottom: 1.5px solid var(--border) !important;
          box-shadow: 0 12px 40px rgba(13, 21, 38, 0.22) !important;
          border-radius: 0 0 var(--radius-xl) var(--radius-xl) !important;
          flex-direction: column !important;
          gap: 12px !important;
        }
        .sidebar.mobile-open {
          display: flex !important;
        }

        /* داخل الـ sidebar pills أفقية */
        .status-pills {
          flex-direction: row;
          overflow-x: auto;
          scrollbar-width: none;
          padding: 8px;
          gap: 6px;
        }
        .status-pills::-webkit-scrollbar {
          display: none;
        }
        .status-pill {
          flex-shrink: 0;
          font-size: 11px;
        }

        /* ── Main content: عرض كامل ── */
        .main-content {
          width: 100% !important;
          max-width: 100% !important;
          padding-top: 16px;
        }

        /* ══════════════════════════════════════════════
           CARDS: عمود واحد — كارت كبير مريح للمس
           ══════════════════════════════════════════════ */
        .cards-grid {
          display: flex !important;
          flex-direction: column !important;
          gap: 14px !important;
        }

        /* كل كارت: صورة + معلومات في صف علوي، وصف أزرار كامل العرض
           تحته — استخدمنا Grid بدل الـ row القديم لأن الـ flex-row
           كان بيمدّد زرار "اطلب الآن" لارتفاع الكارت كله (شكل غير احترافي) */
        .card {
          display: grid !important;
          grid-template-columns: 136px 1fr;
          grid-template-rows: minmax(156px, auto) auto;
          grid-template-areas: "img body" "footer footer";
          min-height: 0;
          align-items: stretch;
        }

        /* الصورة: مستطيل أكبر على اليمين بدل المربع القديم — بياخد
           مساحة أكتر ويستحوذ على الصورة بشكل أوضح */
        .card-img-wrap {
          grid-area: img;
          width: 100% !important;
          height: 100% !important;
          flex-shrink: 0 !important;
          padding-top: 0 !important;
          position: relative !important;
          min-height: 156px;
          overflow: hidden;
        }
        .card-img-wrap .card-img {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          object-fit: cover;
        }
        .card-img-wrap .card-img-ph {
          position: absolute;
          inset: 0;
        }

        /* Badge الحالة: يبقى في الصورة */
        .card-status {
          top: 8px;
          right: 8px;
        }
        .card-status .badge {
          font-size: 10px;
          padding: 3px 8px;
        }

        /* إخفاء الـ overlay (مش مفيد على موبايل) */
        .card-overlay {
          display: none !important;
        }

        /* جانب المعلومات: العمود التاني في نفس الصف العلوي */
        .card-body {
          grid-area: body;
          min-width: 0 !important;
          padding: 10px 14px 8px !important;
          gap: 5px !important;
          display: flex;
          flex-direction: column;
          justify-content: center;
        }
        .card-name {
          font-size: 14px !important;
          font-weight: 700 !important;
          line-height: 1.3 !important;
        }
        .card-code-badge {
          font-size: 10px !important;
          padding: 2px 7px !important;
        }
        .card-desc {
          font-size: 12px !important;
          -webkit-line-clamp: 2 !important;
        }
        .card-group {
          font-size: 11px !important;
        }
        .color-dot {
          width: 16px;
          height: 16px;
        }
        .card-colors {
          gap: 4px;
        }
        .card-price {
          font-size: 13px !important;
          padding: 4px 10px !important;
          margin-top: 2px;
          align-self: flex-end; /* السعر يبقى في الجهة التانية بعيد عن الصورة */
        }

        /* Footer: صف كامل العرض تحت الصورة والمعلومات — زر عادي الارتفاع
           بدل ما كان بيتمدد لطول الكارت كله */
        .card-footer {
          grid-area: footer;
          padding: 8px 14px 12px !important;
          margin-top: 4px;
          border-top: 1px solid var(--border);
          gap: 8px !important;
        }
        .btn-order {
          font-size: 12px !important;
          padding: 10px 12px !important;
          min-height: 44px;
        }
        .btn-details {
          width: 44px !important;
          height: 44px !important;
          font-size: 16px !important;
          flex-shrink: 0;
        }

        /* Group header */
        .group-header {
          margin: 24px 0 12px;
          gap: 8px;
        }
        .group-title {
          font-size: 15px;
        }
        .group-icon {
          width: 32px;
          height: 32px;
        }

        /* Results bar */
        .results-header {
          margin-bottom: 12px;
        }
        .results-info {
          font-size: 12px;
        }

        /* Drawer */
        .drawer {
          width: 100% !important;
          border-radius: 0 !important;
        }
        .modal-gallery-main {
          padding-top: 82%;
        }
        .modal-content {
          padding: 16px;
        }
        .modal-meta-grid {
          grid-template-columns: 1fr 1fr;
          gap: 8px;
        }
        .modal-order {
          padding: 16px;
        }
        .order-row {
          grid-template-columns: auto 1fr;
        }

        /* Cart */
        .cart-panel {
          width: 100% !important;
          border-radius: 0 !important;
        }

        /* Modal: bottom sheet */
        .modal-backdrop {
          padding: 0;
          align-items: flex-end;
        }
        .modal {
          border-radius: var(--radius-lg) var(--radius-lg) 0 0;
          max-height: 94vh;
        }
      }

      /* ══════════════════════════════════════════════════════
         SMALL PHONES — ≤400px  (نفس الـ row layout)
         ══════════════════════════════════════════════════════ */
      @media (max-width: 400px) {
        .layout {
          padding: 0 10px 120px !important;
        }
        .card-img-wrap {
          min-height: 130px;
        }
        .card {
          grid-template-columns: 118px 1fr;
          grid-template-rows: minmax(130px, auto) auto;
          min-height: 0;
        }
        .card-name {
          font-size: 13px !important;
        }
        .btn-order {
          font-size: 11px !important;
          min-height: 42px;
        }
        .btn-details {
          width: 42px !important;
          height: 42px !important;
        }
        .mobile-filter-btn {
          padding: 8px 12px;
          font-size: 12px;
        }
        .cart-btn {
          padding: 7px 10px;
        }
      }

      /* ══════════════════════════════════════════════════════
         LANDSCAPE PHONES — 2-col grid
         ══════════════════════════════════════════════════════ */
      @media (max-width: 768px) and (orientation: landscape) and (min-width: 560px) {
        .cards-grid {
          display: grid !important;
          grid-template-columns: repeat(2, 1fr) !important;
          gap: 12px !important;
        }
        .card {
          display: flex !important;
          flex-direction: column !important;
          min-height: auto;
        }
        .card-img-wrap {
          width: 100% !important;
          height: auto !important;
          padding-top: 60% !important;
          min-height: 0 !important;
          border-radius: var(--radius-lg) var(--radius-lg) 0 0 !important;
        }
        .card-body {
          padding: 10px !important;
        }
        .card-footer {
          padding: 6px 10px 10px !important;
          margin-top: 0;
          border-top: none;
        }
      }

      /* ===== CART BUTTON (header) ===== */
      .cart-btn {
        position: relative;
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 9px 16px;
        background: var(--surface);
        border: 1.5px solid var(--border2);
        border-radius: 50px;
        font-family: var(--font);
        font-size: 12px;
        font-weight: 700;
        color: var(--text2);
        cursor: pointer;
        transition: all var(--transition);
        white-space: nowrap;
      }
      .cart-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--primary-soft);
        box-shadow: 0 2px 10px rgba(37, 99, 235, 0.13);
      }
      .cart-btn.has-items {
        border-color: #25d366;
        color: #15803d;
        background: #f0fdf4;
        box-shadow: 0 2px 10px rgba(37, 211, 102, 0.18);
      }
      .cart-badge {
        display: none;
        position: absolute;
        top: -6px;
        left: -6px;
        min-width: 20px;
        height: 20px;
        background: var(--danger);
        color: #fff;
        font-size: 10px;
        font-weight: 800;
        border-radius: 50px;
        padding: 0 5px;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 6px rgba(220, 38, 38, 0.4);
        animation: cartPop 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .cart-badge.visible {
        display: flex;
      }
      @keyframes cartPop {
        0% {
          transform: scale(0.4);
          opacity: 0;
        }
        70% {
          transform: scale(1.25);
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      /* ===== CART PANEL ===== */
      .cart-panel-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        z-index: 800;
        backdrop-filter: blur(3px);
      }
      .cart-panel-overlay.open {
        display: block;
      }
      .cart-panel {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: 420px;
        max-width: 96vw;
        background: var(--surface);
        z-index: 900;
        display: flex;
        flex-direction: column;
        box-shadow: 4px 0 40px rgba(13, 21, 38, 0.18);
        transform: translateX(-100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border-radius: 0 var(--radius-xl) var(--radius-xl) 0;
      }
      .cart-panel.open {
        transform: translateX(0);
      }
      .cart-panel-header {
