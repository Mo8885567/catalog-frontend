        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 20px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        gap: 12px;
      }
      .cart-panel-header h2 {
        font-size: 16px;
        font-weight: 800;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .cart-panel-close {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 1.5px solid var(--border);
        background: var(--surface2);
        font-size: 15px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text3);
        transition: all var(--transition);
        flex-shrink: 0;
      }
      .cart-panel-close:hover {
        background: var(--danger-soft);
        border-color: var(--danger);
        color: var(--danger);
      }
      .cart-items-list {
        flex: 1;
        overflow-y: auto;
        padding: 14px 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .cart-empty {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        color: var(--text3);
        text-align: center;
        padding: 40px 20px;
      }
      .cart-empty-icon {
        font-size: 52px;
        opacity: 0.5;
      }
      .cart-empty p {
        font-size: 13px;
        font-weight: 500;
      }

      /* Cart item row */
      .cart-item {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 14px;
        display: flex;
        align-items: flex-start;
        gap: 11px;
        transition: box-shadow var(--transition);
        position: relative;
      }
      .cart-item:hover {
        box-shadow: var(--shadow-sm);
      }
      .cart-item-img {
        width: 52px;
        height: 52px;
        object-fit: cover;
        border-radius: 10px;
        border: 1px solid var(--border);
        flex-shrink: 0;
      }
      .cart-item-img-ph {
        width: 52px;
        height: 52px;
        background: var(--surface3);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        flex-shrink: 0;
      }
      .cart-item-info {
        flex: 1;
        min-width: 0;
      }
      .cart-item-name-row {
        display: flex;
        align-items: center;
        gap: 7px;
        flex-wrap: wrap;
        margin-bottom: 4px;
      }
      .cart-item-name {
        font-size: 13px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.3;
        flex: 1;
        min-width: 0;
      }
      .cart-item-code {
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 800;
        color: var(--accent);
        background: linear-gradient(
          135deg,
          var(--primary-soft) 0%,
          #dbeafe 100%
        );
        border: 1.5px solid var(--primary-mid);
        padding: 4px 10px;
        border-radius: 20px;
        display: inline-flex;
        align-items: center;
        flex-shrink: 0;
        letter-spacing: 0.4px;
        box-shadow: 0 1px 4px rgba(37, 99, 235, 0.1);
      }
      .cart-item-color {
        font-size: 11px;
        color: var(--text2);
        display: flex;
        align-items: center;
        gap: 5px;
        margin-bottom: 8px;
      }
      .cart-item-color-dot {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        border: 1.5px solid rgba(0, 0, 0, 0.12);
        flex-shrink: 0;
      }
      .cart-item-qty-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .qty-btn {
        width: 26px;
        height: 26px;
        border: 1.5px solid var(--border2);
        border-radius: 8px;
        background: var(--surface);
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text2);
        transition: all var(--transition);
        flex-shrink: 0;
        line-height: 1;

        border-color: var(--accent);
        color: var(--accent);
        background: var(--primary-soft);

        font-size: 13px;
        font-weight: 800;
        color: var(--text);
        min-width: 26px;
        text-align: center;
      }

        position: absolute;
        top: 10px;
        left: 10px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: none;
        background: var(--surface3);
        color: var(--text3);
        font-size: 11px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--transition);
      }
      .cart-item-remove:hover {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .cart-panel-footer {
        padding: 16px 20px;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .cart-summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 13px;
        color: var(--text2);
      }

        color: var(--text);
        font-weight: 800;
      }

        padding: 9px;
        border: 1.5px solid var(--border2);
        border-radius: var(--radius-sm);
        background: var(--surface2);
        font-family: var(--font);
        font-size: 12px;
        font-weight: 600;
        color: var(--text3);
        cursor: pointer;
        transition: all var(--transition);
        text-align: center;
      }
      .btn-cart-clear:hover {
        border-color: var(--danger);
        color: var(--danger);
        background: var(--danger-soft);
      }

        padding: 14px;
        background: #25d366;
        color: #fff;
        border: none;
        border-radius: var(--radius);
        font-family: var(--font);
        font-size: 14px;
        font-weight: 800;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: all var(--transition);
        box-shadow: 0 4px 16px rgba(37, 211, 102, 0.35);

        left: 0;

         ثم تتحول غامق (flash of wrong theme) */
      (function () {
        try {
          var saved = localStorage.getItem("moo_catalog_theme");
          var theme =
            saved ||
            (window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light");
          if (theme === "dark") {
            document.documentElement.setAttribute("data-theme", "dark");
          }
        } catch (e) {}
      })();

      // ── تحويل روابط Google Drive للعرض المباشر ───────────────
      // ملحوظة: بنستخدم صيغة lh3.googleusercontent.com بدل /thumbnail
      // لأن /thumbnail بيترفض كتير لما يتحمّل من دومين مختلف (زي الـ
      // iframe المعزول بتاع Apps Script) حتى لو اللينك شغال لوحده
      // في تاب المتصفح العادي.
      function _fixDriveUrl(url) {
        if (!url) return "";
        var id = "";
        var m;
        m = url.match(/\/file\/d\/([^\/\?]+)/);
        if (m) id = m[1];
        if (!id) {
          m = url.match(/[?&]id=([^&]+)/);
          if (m) id = m[1];
        }
        if (!id) return url;
        return "https://lh3.googleusercontent.com/d/" + id + "=w500";
      }

      // ── نسخة أصغر مخصوصة لصورة الكارت في الشبكة ───────────────
      // it.image_url متخزن بمقاس =w500 (مناسب للمودال/المعرض)، لكن
      // مربع الكارت نفسه أصغر بكتير (~136px)، فطلب نفس الـ 500px لكل
      // كارت في الصفحة (ممكن تكون 15+ صورة مرة واحدة) بيبقى استهلاك
      // بيانات وطلبات زيادة من غير داعي وبيبطّئ التحميل الأول للكتالوج.
      // بنستبدل الرقم بمقاس أصغر بس لعرض الشبكة، ونسيب باقي الاستخدامات
      // (المعرض، السلة) على المقاس الأصلي عشان الجودة تفضل كويسة.
      function _gridThumbUrl(url) {
        if (!url) return url;
        return url.replace(/=w\d+$/, "=w260");
      }

          if (s === "available") avail++;
          else if (s === "low") low++;
          else zero++;

        document.getElementById("stat-total").textContent = items.length;
        document.getElementById("stat-avail").textContent = PUB.urlNoqty
          ? items.length
          : avail;
        document.getElementById("stat-low").textContent = PUB.urlNoqty
          ? "—"

        document.getElementById("sf-avail-count").textContent = avail;

            '🔍 ' + _esc(PUB.searchQ) + ' <span style="font-size:10px;opacity:.7">✕</span></span>');

      // ── Filter + sort ─────────────────────────────────────────────
      function _getFiltered() {
        var q = PUB.searchQ.toLowerCase();
        var res = PUB.items.filter(function (it) {
          if (PUB.groupFilter !== "all" && it.group !== PUB.groupFilter)
            return false;
          var s = _stockStatus(it);
          // لو مش showzero → أخفِ الأصناف المنتهية تماماً
          if (!PUB.urlShowzero && s === "out") return false;
          // فلتر الحالة في الـ sidebar
          if (!PUB.urlNoqty) {
            if (PUB.statusFilter === "avail" && s !== "available") return false;
            if (PUB.statusFilter === "low" && s !== "low") return false;
          }
          if (q) {
            var hay = (
              (it.code || "") +
              " " +
              (it.name || "") +
              " " +
              (it.description || "")
            ).toLowerCase();
            if (hay.indexOf(q) === -1) return false;
          }
          return true;
        });

        // Sort
        if (PUB.sortMode === "name-asc") {
          res.sort(function (a, b) {
            return (a.name || "").localeCompare(b.name || "", "ar");
          });
        } else if (PUB.sortMode === "name-desc") {
          res.sort(function (a, b) {
            return (b.name || "").localeCompare(a.name || "", "ar");
          });
        } else if (PUB.sortMode === "price-asc") {
          res.sort(function (a, b) {
            return Number(a.selling_price || 0) - Number(b.selling_price || 0);
          });
        } else if (PUB.sortMode === "price-desc") {
          res.sort(function (a, b) {
            return Number(b.selling_price || 0) - Number(a.selling_price || 0);
          });
        }

        return res;
      }

      // ── Render ───────────────────────────────────────────────────
      function _render() {
        var items = _getFiltered();
        var wrap = document.getElementById("pub-items-wrap");
        var info = document.getElementById("results-info");
        info.innerHTML =
          "عرض <b>" +
          items.length +
          "</b> صنف" +
          (PUB.searchQ ? ' لـ "' + _esc(PUB.searchQ) + '"' : "");

        if (!items.length) {
          wrap.innerHTML =
            '<div class="empty-wrap"><div class="empty-icon">🔍</div><h3>لا توجد نتائج</h3><p>جرّب تغيير كلمة البحث أو الفلتر</p></div>';
          return;
        }

        _cardRenderIndex = 0; /* بيتصفّر كل رندر عشان أول كروت تتحمل فورًا (eager) والباقي lazy */
        if (PUB.viewMode === "list") {
          wrap.innerHTML = _buildTable(items);
        } else {
          wrap.innerHTML = _buildGrid(items);
        }
      }
      var _cardRenderIndex = 0;
      /* عدد الصور اللي تتحمل فورًا (eager/high-priority) بدل ما تستنى الـ lazy —
         على الموبايل بيبقى عمود واحد فبس 2-3 كروت ظاهرة فعليًا فوق الشاشة،
         فمفيش داعي نحمّل 8 صور بأولوية عالية ونزاحم أول كروت ظاهرة فعلاً */
      var _EAGER_IMG_COUNT = window.innerWidth <= 768 ? 4 : 8;

      // ── Grid ─────────────────────────────────────────────────────
      function _buildGrid(items) {
        var groups = {};
        var groupOrder = [];
        items.forEach(function (it) {
          var k = it.group || "__none__";
          if (!groups[k]) {
            groups[k] = [];
            groupOrder.push(k);
          }
          groups[k].push(it);
        });

        return groupOrder
          .map(function (k) {
            var grpName = k === "__none__" ? "أصناف أخرى" : _groupName(k);
            var cards = groups[k].map(_buildCard).join("");
            return (
              '<div class="group-header">' +
              '<div class="group-icon">📦</div>' +
              '<span class="group-title">' +
              _esc(grpName) +
              "</span>" +
              '<span class="group-badge">' +
              groups[k].length +
              " صنف</span>" +
              '<div class="group-line"></div></div>' +
              '<div class="cards-grid">' +
              cards +
              "</div>"
            );
          })
          .join("");
      }

      function _buildCard(it) {
        // ✅ fallback: استخدم code لو موجود، وإلا id
        it.code = it.code || it.id || "";
        var s = _stockStatus(it);

        // لما urlNoqty → أخفِ badge الحالة والرصيد نهائياً
        var badge = PUB.urlNoqty
          ? ""
          : s === "available"
            ? '<span class="badge badge-avail">✅ متاح</span>'
            : s === "low"
              ? '<span class="badge badge-low">⚠️ محدود</span>'
              : '<span class="badge badge-out">❌ نفذ</span>';

        var _isEager = _cardRenderIndex < _EAGER_IMG_COUNT;
        _cardRenderIndex++;
        var imgHtml = it.image_url
          ? '<img src="' +
            _esc(_gridThumbUrl(it.image_url)) +
            '" class="card-img" ' +
            (_isEager
              ? 'loading="eager" fetchpriority="high"'
              : 'loading="lazy" fetchpriority="low"') +
            ' decoding="async"' +
            ' onload="this.classList.add(\'loaded\')"' +
            ' onerror="this.parentElement.innerHTML=\'<div class=card-img-ph><div class=ph-icon>📦</div><div class=ph-ph-text>لا توجد صورة</div></div>\'">'
          : '<div class="card-img-ph"><div class="ph-icon">📦</div></div>';

        var colors = _parseColors(it.colors_json);

        // Build color preview layer (hidden img + name tag)
        var previewHtml =
          '<img class="card-color-preview" src="" alt="">' +
          '<div class="card-color-tag">' +
          '<div class="card-color-tag-dot"></div>' +
          "<span></span>" +
          "</div>";

        var colorDots = colors
          .slice(0, 7)
          .map(function (c) {
            var hex =
              c.hex || COLOR_HEX_MAP[c.code] || _guessHex(c.name) || "#94a3b8";
            var dotStyle = c.image
              ? 'style="object-fit:cover;background:' + hex + '"'
              : 'style="background:' + hex + '"';
            var imgAttr = c.image ? ' data-cimg="' + _esc(c.image) + '"' : "";
            var dotContent = c.image
              ? '<img src="' +
                _esc(c.image) +
                '" style="width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.style.display=\'none\'">'
              : "";
            return (
              '<div class="color-dot"' +
              dotStyle +
              ' title="' +
              _esc(c.name) +
              '"' +
              imgAttr +
              ' data-cname="' +
              _esc(c.name) +
              '"' +
              ' data-chex="' +
              _esc(hex) +
              '"' +
              ' data-ccard="' +
              _esc(it.code) +
              '"' +
              ' onmouseenter="previewCardColor(this)"' +
              ' onmouseleave="_hideCardColorPreview(this)"' +
              ' onclick="event.stopPropagation();previewCardColor(this)"' +
              ">" +
              dotContent +
              "</div>"
            );
          })
          .join("");
        if (colors.length > 7) {
          colorDots +=
            '<div class="colors-more">+' + (colors.length - 7) + "</div>";
        }

        var priceHtml =
          !PUB.urlNoprices && it.selling_price && Number(it.selling_price) > 0
            ? '<div class="card-price">💰 ' +
              Number(it.selling_price).toLocaleString("en-US") +
              " ج.م</div>"
            : "";

        // لما urlNoqty → كل الأصناف قابلة للطلب
        var isDisabled = !PUB.urlNoqty && s !== "available" && s !== "low";
        // ⚠️ لا تضع disabled على الزر مباشرة — ده بيمنع onclick event
        // بدلاً من كده استخدم class + معالجة داخل الدالة
        var orderBtnClass =
          "btn-order" + (isDisabled ? " btn-order-disabled" : "");

        return (
          '<div class="card" onclick="openDrawer(\'' +
          _esc(it.code) +
          "')\">" +
          '<div class="card-img-wrap">' +
          imgHtml +
          previewHtml +
          (badge ? '<div class="card-status">' + badge + "</div>" : "") +
          '<div class="card-overlay"><button class="card-overlay-btn" onclick="event.stopPropagation();openDrawer(\'' +
          _esc(it.code) +
          "')\">👁️ عرض التفاصيل</button></div>" +
          "</div>" +
          '<div class="card-body">' +
          '<div class="card-name-row">' +
          '<div class="card-name">' +
          _esc(it.name || "") +
          "</div>" +
          (it.code
            ? '<span class="card-code-badge" title="انقر لنسخ الكود" onclick="event.stopPropagation();_copyCode(\'' +
              _esc(it.code) +
              "')\">" +
              _esc(it.code) +
              "</span>"
            : "") +
          "</div>" +
          (it.description
            ? '<div class="card-desc">' + _esc(it.description) + "</div>"
            : "") +
          '<div class="card-group">' +
          _esc(_groupName(it.group)) +
          "</div>" +
          (colorDots
            ? '<div class="card-colors">' + colorDots + "</div>"
            : "") +
          priceHtml +
          "</div>" +
          '<div class="card-footer">' +
          '<button class="' +
          orderBtnClass +
          '" onclick="event.stopPropagation();' +
          (isDisabled
            ? "_showToast('❌ هذا الصنف غير متاح حالياً')"
            : "openOrderModal('" + _esc(it.code) + "')") +
          '">💬 اطلب الآن</button>' +
          '<button class="btn-details" title="تفاصيل" onclick="event.stopPropagation();openDrawer(\'' +
          _esc(it.code) +
          "')\">👁️</button>" +
          "</div></div>"
        );
      }

      // ── Color preview on card ─────────────────────────────────────
      var _cardPreviewTimers = {};
      var _cardIdCounter = 0;

      // بيخفي البريفيو فورًا لما الماوس يسيب الدائرة (تجربة hover طبيعية
      // على الديسكتوب)، بدل ما نستنى الـ timer التلقائي
      function _hideCardColorPreview(dotEl) {
        var card = dotEl.closest(".card");
        if (!card) return;
        var timerKey = card._previewId;
        if (timerKey && _cardPreviewTimers[timerKey]) {
          clearTimeout(_cardPreviewTimers[timerKey]);
          delete _cardPreviewTimers[timerKey];
        }
        var prevImg = card.querySelector(".card-color-preview");
        var tag = card.querySelector(".card-color-tag");
        if (prevImg) prevImg.classList.remove("show");
        if (tag) tag.classList.remove("show");
        dotEl.classList.remove("active-dot");
      }

      function previewCardColor(dotEl) {
        var imgSrc = dotEl.getAttribute("data-cimg");
        var name = dotEl.getAttribute("data-cname") || "";
        var hex = dotEl.getAttribute("data-chex") || "#94a3b8";

        // navigate up to the card, then find its preview elements
        var card = dotEl.closest(".card");
        if (!card) return;
        var prevImg = card.querySelector(".card-color-preview");
        var tag = card.querySelector(".card-color-tag");
        var tagDot = card.querySelector(".card-color-tag-dot");
        var tagName = card.querySelector(".card-color-tag span");

        // ✅ استخدم ID فريد على الكارت كـ timer key بدلاً من DOM element
        if (!card._previewId) {
          card._previewId = "card_" + ++_cardIdCounter;
        }
        var timerKey = card._previewId;

        // مسح أي timer سابق على نفس الكارت
        if (_cardPreviewTimers[timerKey]) {
          clearTimeout(_cardPreviewTimers[timerKey]);
          delete _cardPreviewTimers[timerKey];
        }

        // إخفاء أي preview سابق على نفس الكارت
        if (prevImg) prevImg.classList.remove("show");
        if (tag) tag.classList.remove("show");

        // mark active dot, clear siblings
        var wrap = dotEl.closest(".card-colors");
        if (wrap) {
          wrap.querySelectorAll(".color-dot").forEach(function (d) {
            d.classList.remove("active-dot");
          });
        }

        // click same dot again → toggle off
        if (dotEl.classList.contains("active-dot")) {
          dotEl.classList.remove("active-dot");
          return;
        }

        dotEl.classList.add("active-dot");

        // helper: show tag only (no image)
        function showTagOnly() {
          if (tag && tagDot && tagName) {
            tagDot.style.background = hex;
            tagName.textContent = name;
            tag.classList.add("show");
          }
          _cardPreviewTimers[timerKey] = setTimeout(function () {
            if (tag) tag.classList.remove("show");
            dotEl.classList.remove("active-dot");
            delete _cardPreviewTimers[timerKey];
          }, 2500);
        }

        if (!imgSrc || !prevImg) {
          showTagOnly();
          return;
        }

        // preload → reveal with slide-up animation
        var tmp = new Image();
        tmp.onload = function () {
          prevImg.src = imgSrc;
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              prevImg.classList.add("show");
            });
          });
          if (tag && tagDot && tagName) {
            tagDot.style.background = hex;
            tagName.textContent = name;
            tag.classList.add("show");
          }
          // auto-hide after 3.2s
          _cardPreviewTimers[timerKey] = setTimeout(function () {
            if (prevImg) prevImg.classList.remove("show");
            if (tag) tag.classList.remove("show");
            dotEl.classList.remove("active-dot");
            delete _cardPreviewTimers[timerKey];
          }, 3200);
        };
        tmp.onerror = showTagOnly;
        tmp.src = imgSrc;
      }

      // ── Table ─────────────────────────────────────────────────────
      function _buildTable(items) {
        var rows = items
          .map(function (it) {
            it.code = it.code || it.id || "";
            var s = _stockStatus(it);
            var badge = PUB.urlNoqty
              ? ""
              : s === "available"
                ? '<span class="badge badge-avail">متاح</span>'
                : s === "low"
                  ? '<span class="badge badge-low">محدود</span>'
                  : '<span class="badge badge-out">نفذ</span>';
            var thumb = it.image_url
              ? '<img src="' +
                _esc(it.image_url) +
                '" class="table-thumb" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=table-thumb-ph>📦</div>\'">'
              : '<div class="table-thumb-ph">📦</div>';
            var colors = _parseColors(it.colors_json);
            var dots = colors
              .slice(0, 6)
              .map(function (c) {
                var hex =
                  c.hex ||
                  COLOR_HEX_MAP[c.code] ||
                  _guessHex(c.name) ||
                  "#94a3b8";
                return (
                  '<div class="color-dot" style="background:' +
                  hex +
                  ';width:14px;height:14px" title="' +
                  _esc(c.name) +
                  '"></div>'
                );
              })
              .join("");
            var price =
              !PUB.urlNoprices &&
              it.selling_price &&
              Number(it.selling_price) > 0
                ? Number(it.selling_price).toLocaleString("en-US") + " ج.م"
                : "—";

            return (
              "<tr onclick=\"openDrawer('" +
              _esc(it.code) +
              "')\">" +
              "<td>" +
              thumb +
              "</td>" +
              '<td><span style="font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent);background:var(--primary-soft);padding:3px 7px;border-radius:6px">' +
              _esc(it.code || "") +
              "</span></td>" +
              '<td><div class="table-name">' +
              _esc(it.name || "") +
              "</div>" +
              (it.description
                ? '<div class="table-sub">' + _esc(it.description) + "</div>"
                : "") +
              "</td>" +
              '<td style="color:var(--text2)">' +
              _esc(_groupName(it.group)) +
              "</td>" +
              '<td style="color:var(--text2)">' +
              _esc(it.unit || "—") +
              "</td>" +
              '<td><div style="display:flex;gap:3px;flex-wrap:wrap">' +
              (dots || "—") +
              "</div></td>" +
              "<td>" +
              badge +
              "</td>" +
              '<td style="font-weight:700">' +
              price +
              "</td>" +
              '<td onclick="event.stopPropagation()"><button class="btn-order" style="padding:7px 14px;font-size:11px" onclick="openDrawer(\'' +
              _esc(it.code) +
              "')\">💬 اطلب</button></td>" +
              "</tr>"
            );
          })
          .join("");

        return (
          '<div class="table-wrap"><table class="data-table">' +
          "<thead><tr>" +
          '<th style="width:56px"></th><th>الكود</th><th>الصنف</th><th>المجموعة</th>' +
          "<th>الوحدة</th><th>الألوان</th><th>الحالة</th><th>السعر</th><th></th>" +
          "</tr></thead><tbody>" +
          rows +
          "</tbody></table></div>"
        );
      }

      // ── تأكيد بسيط (نسخة مستقلة — الصفحة دي مالهاش وصول لمدراء الواجهة
      // الرئيسية زي showConfirm/confirmDelete في التطبيق الأساسي) ──────
      function _pubConfirm(message, onConfirm) {
        var old = document.getElementById("pub-confirm-backdrop");
        if (old) old.remove();

        var bg = document.createElement("div");
        bg.id = "pub-confirm-backdrop";
        bg.style.cssText =
          "position:fixed;inset:0;z-index:99998;background:rgba(15,23,42,0.5);" +
          "display:flex;align-items:center;justify-content:center;padding:20px;";
        bg.onclick = function (e) {
          if (e.target === bg) bg.remove();
        };

        var box = document.createElement("div");
        box.style.cssText =
          "background:var(--surface,#fff);border-radius:var(--radius-lg,16px);max-width:360px;" +
          "width:100%;padding:24px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,0.25);" +
          "font-family:inherit;direction:rtl;";
        box.innerHTML =
          '<div style="font-size:15px;color:var(--text,#1e293b);line-height:1.6;margin-bottom:20px">' +
          message.replace(/&/g, "&amp;").replace(/</g, "&lt;") +
          "</div>" +
          '<div style="display:flex;gap:10px;justify-content:center">' +
          '<button id="pub-confirm-cancel" style="flex:1;padding:11px;border-radius:var(--radius-sm,8px);' +
          'border:1px solid var(--border,#e2e8f0);background:var(--surface2,#fff);color:var(--text2,#334155);font-size:14px;cursor:pointer">إلغاء</button>' +
          '<button id="pub-confirm-ok" style="flex:1;padding:11px;border-radius:var(--radius-sm,8px);' +
          'border:none;background:var(--danger,#dc2626);color:#fff;font-size:14px;cursor:pointer">تأكيد</button>' +
          "</div>";

        bg.appendChild(box);
        document.body.appendChild(bg);

        document.getElementById("pub-confirm-cancel").onclick = function () {
          bg.remove();
        };
        document.getElementById("pub-confirm-ok").onclick = function () {
          bg.remove();
          onConfirm();
        };
      }

      // ── Modal ────────────────────────────────────────────────────
      var _modalState = { currentImg: "", colors: [], selectedColor: "", minOrderQty: 1, qtyStep: 1 };
      var _gallerySlideTimer = null;
      var _galleryState = { imgs: [], idx: 0, paused: false, front: 0, loaded: {} };

      // يعرض صورة واحدة في المعرض مع أسهم تنقل + نقاط + عداد،
      // وبيبدّل بينهم أوتوماتيك كل شوية لو فيه أكتر من صورة،
      // مع إيقاف مؤقت لما الماوس فوق الصورة أو لما المستخدم يتفاعل يدوي.
      // كل صورة بتتحمّل الأول في الخلفية (preload) وبعدين تتعمل لها
      // crossfade بين طبقتين، فمفيش "فلاش" فراغ ولا قفزة مفاجئة.
      function _setGalleryImages(imgs, crossfadeIn) {
        clearInterval(_gallerySlideTimer);
        _gallerySlideTimer = null;
        imgs = (imgs || []).filter(Boolean);
        /* لما بنبدّل مجموعة صور (مثلاً عند تغيير اللون) بنفضّل نكمل من
           نفس طبقة الـ front الحالية عشان الكروسفيد يشتغل صح، بدل ما
           نصفّرها ونضطر لعرض فوري بدون تلاشي */
        var keepFront = crossfadeIn && _galleryState ? _galleryState.front : 0;
        var keepLoaded = crossfadeIn && _galleryState ? _galleryState.loaded : {};
        _galleryState = { imgs: imgs, idx: 0, paused: false, front: keepFront, loaded: keepLoaded };

        var dotsWrap = document.getElementById("gallery-dots");
        var mainWrap = document.getElementById("modal-gallery-main");
        var layerA = document.getElementById("modal-main-img-0");
        if (!imgs.length || !layerA) return;

        /* build dots */
        if (dotsWrap) {
          dotsWrap.innerHTML =
            imgs.length > 1
              ? imgs
                  .map(function (_, i) {
                    return (
                      '<button class="gallery-dot' + (i === 0 ? " active" : "") +
                      '" onclick="event.stopPropagation();_galleryGoTo(' + i + ')"></button>'
                    );
                  })
                  .join("")
              : "";
        }

        /* أول ظهور للمودال: قفزة فورية (مفيش صورة سابقة نتلاشى منها).
           تبديل لون وإحنا شايفين المعرض بالفعل: كروسفيد سلس. */
        _galleryRender(0, !crossfadeIn);

        if (imgs.length > 1) {
          _gallerySlideTimer = setInterval(function () {
            if (!_galleryState.paused) _galleryNext();
          }, 3600); /* إيقاع أهدأ وأكثر احترافية بدل التبديل السريع */
        }

        /* وقف مؤقت عند مرور الماوس (ديسكتوب) */
        if (mainWrap && !mainWrap._galleryBound) {
          mainWrap._galleryBound = true;
          mainWrap.addEventListener("mouseenter", function () {
            _galleryState.paused = true;
          });
          mainWrap.addEventListener("mouseleave", function () {
            _galleryState.paused = false;
          });

          /* دعم السحب باللمس على الموبايل */
          var touchStartX = 0;
          mainWrap.addEventListener(
            "touchstart",
            function (e) {
              touchStartX = e.touches[0].clientX;
              _galleryState.paused = true;
            },
            { passive: true }
          );
          mainWrap.addEventListener(
            "touchend",
            function (e) {
              var dx = e.changedTouches[0].clientX - touchStartX;
              if (Math.abs(dx) > 40) {
                if (dx > 0) _galleryPrev();
                else _galleryNext();
              }
              _galleryState.paused = false;
            },
            { passive: true }
          );
        }
      }

      /* يحمّل صورة في الذاكرة الأول (preload) قبل ما يعرضها، عشان
         التبديل يبان سلس من غير أي وميض أو تأخير أثناء التحميل */
      function _preload(src, cb) {
        if (_galleryState.loaded[src]) return cb();
        var im = new Image();
        im.onload = im.onerror = function () {
          _galleryState.loaded[src] = true;
          cb();
        };
        im.src = src;
      }

      /* يعرض صورة بعينها في المعرض بتقنية الـ crossfade بين طبقتين،
         ويحدّث الخلفية الضبابية + النقط + العداد */
      function _galleryRender(i, skipFade) {
        var imgs = _galleryState.imgs;
        if (!imgs.length) return;
        _galleryState.idx = ((i % imgs.length) + imgs.length) % imgs.length;
        var src = imgs[_galleryState.idx];
        var counterEl = document.getElementById("gallery-counter");
        var backdrop = document.getElementById("gallery-zoom-backdrop");

        var back = _galleryState.front === 0 ? 1 : 0;
        var layerFront = document.getElementById("modal-main-img-" + _galleryState.front);
        var layerBack = document.getElementById("modal-main-img-" + back);

        var apply = function () {
          if (layerBack) {
            layerBack.src = src;
            layerBack.classList.add("active");
          }
          if (layerFront) layerFront.classList.remove("active");
          if (backdrop) {
            backdrop.style.backgroundImage = "url('" + src + "')";
            backdrop.classList.add("active");
          }
          _galleryState.front = back;
        };

        if (skipFade) {
          _preload(src, function () {
            if (layerFront) {
              layerFront.src = src;
              layerFront.classList.add("active");
            }
            if (backdrop) {
              backdrop.style.backgroundImage = "url('" + src + "')";
              backdrop.classList.add("active");
            }
          });
        } else {
          _preload(src, apply);
        }

        _modalState.currentImg = src;
        if (counterEl)
          counterEl.textContent =
            imgs.length > 1
              ? _galleryState.idx + 1 + " / " + imgs.length
              : "";
        document.querySelectorAll(".gallery-dot").forEach(function (d, idx) {
          d.classList.toggle("active", idx === _galleryState.idx);
        });
      }

      function _galleryNext() {
        _galleryRender(_galleryState.idx + 1);
      }
      function _galleryPrev() {
        _galleryRender(_galleryState.idx - 1);
      }
      function _galleryGoTo(i) {
        _galleryRender(i);
      }

      // ═══════════════════════════════════════════════════════
      // DRAWER — شاشة التفاصيل من اليسار
      // ═══════════════════════════════════════════════════════
      function openDrawer(id) {
        var it = PUB.items.find(function (x) {
          return String(x.code || x.id) === String(id);
        });
        if (!it) return;
        it.code = it.code || it.id || "";

        var s = _stockStatus(it);

        /* price */
        var priceBlock =

              Number(it.selling_price).toLocaleString("en-US") + " ج.م</div></div>"
            : "";

        /* color picker */
        var colorPickerHtml = "";
        if (colors.length) {
          colorPickerHtml =
            '<div style="margin-bottom:16px">' +
            '<div class="modal-section-title"><i class="ti ti-palette" style="margin-left:6px"></i> اختر اللون</div>' +
            '<div class="modal-colors-wrap" id="modal-color-cards">' +
            colors.map(function (c, i) {
              var hex = c.hex || COLOR_HEX_MAP[c.code] || _guessHex(c.name) || "#94a3b8";
              var swatchInner = c.image ? '<img src="' + _esc(c.image) + '" onerror="this.style.display=\'none\'">' : "";
              return (
                '<div class="modal-color-card" data-cidx="' + i +
                '" onclick="selectModalColor(' + i + ',this)">' +
                '<div class="mcv-swatch-wrap">' +
                '<div class="mcv-swatch" style="background:' + hex + '">' + swatchInner + "</div>" +
                '<div class="mcv-check">✓</div>' +

                '<div class="mcv-name">' + _esc(c.name) + "</div>" +
                "</div>"
              );
            }).join("") +

            '<div class="modal-selected-color" id="modal-sel-color-bar">' +
            '<div class="modal-color-swatch" id="modal-sel-swatch"></div>' +

            "</div>" +
            "</div>";
        }

        /* order section */
        var canOrder = PUB.urlNoqty || s !== "out";
        var _moq = Math.max(1, Number(_modalState.minOrderQty || 1));
        var _qStep = Math.max(1, Number(_modalState.qtyStep || 1));
        var _moqHintParts = [];
        if (_moq > 1)
          _moqHintParts.push("أقل كمية للطلب: " + _moq + " " + (it.unit ? _esc(it.unit) : "قطعة"));

        var orderSection = canOrder

                _moqHintParts.join(" · ") + "</div>"

            '<div class="order-row">' +
            '<span class="order-label">الكمية:</span>' +
            '<div class="qty-stepper" id="qty-stepper">' +
            '<button type="button" class="qty-step-btn qty-step-minus" id="qty-minus" aria-label="تقليل الكمية">−</button>' +
            '<input type="number" id="modal-qty" class="order-input qty-input" min="' + _moq + '" step="' + _qStep + '" value="' + _moq + '" inputmode="numeric">' +
            '<button type="button" class="qty-step-btn qty-step-plus" id="qty-plus" aria-label="زيادة الكمية">+</button>' +
            "</div>" +
            "</div>" +
            '<button type="button" class="btn-whatsapp" id="btn-add-to-cart" data-item-code="' +
            _esc(it.code) +
            '" style="background:var(--accent);box-shadow:0 4px 16px rgba(37,99,235,0.3);position:relative;z-index:5">' +
            '<i class="ti ti-shopping-cart" style="font-size:16px;margin-left:6px"></i>أضف للسلة</button>' +
            "</div>"
          : "";

        // ── بناء محتوى الـ drawer ──
        var headerLeft =
          "<h2>" + _esc(it.name || "") + "</h2>" +
          (it.code
            ? '<span class="modal-code-badge" onclick="_copyCode(\'' + _esc(it.code) + '\')" title="انقر لنسخ الكود">' +
              '<i class="ti ti-copy" style="font-size:11px"></i>' + _esc(it.code) + "</span>"
            : "") +
          (badge ? " " + badge : "");

        var bodyHtml =
          '<div class="modal-body">' +
          galleryHtml +
          '<div class="modal-content">' +
          '<div class="modal-meta-grid">' +
          '<div class="modal-meta-item"><div class="m-label">كود الصنف</div><div class="m-val mono">' + _esc(it.code || "") + "</div></div>" +
          '<div class="modal-meta-item"><div class="m-label">المجموعة</div><div class="m-val">' + _esc(_groupName(it.group)) + "</div></div>" +
          '<div class="modal-meta-item"><div class="m-label">وحدة القياس</div><div class="m-val">' + _esc(it.unit || "—") + "</div></div>" +
          (it.sizes && String(it.sizes).trim()
            ? '<div class="modal-meta-item"><div class="m-label">المقاسات المتاحة</div><div class="m-val">' +
              _esc(String(it.sizes).split(",").map(function (s) { return s.trim(); }).filter(Boolean).join(", ")) +
              "</div></div>"
            : "") +
          priceBlock +
          "</div>" +
          (it.description
            ? '<p style="font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:16px;padding:12px 14px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border)">' +
              _esc(it.description) + "</p>"
            : "") +
          colorPickerHtml +
          orderSection +
          "</div></div>";

        document.getElementById("drawer-header-left").innerHTML = headerLeft;
        document.getElementById("drawer-body").innerHTML = bodyHtml;

        // ── ربط زرار "أضف للسلة" بمعالج حقيقي (مش onclick inline) ──
        // بيتم الربط من جديد في كل مرة يتفتح فيها الـ drawer، لأن
        // innerHTML بيبني عنصر <button> جديد تمامًا في كل مرة (فمفيش
        // خطر إن المعالج يتكرر أو يفضل معلّق على عنصر قديم اتشال)
        var _addBtn = document.getElementById("btn-add-to-cart");
        if (_addBtn) {
          _addBtn.addEventListener("click", function (ev) {
            ev.preventDefault();
            ev.stopPropagation();
            // رد فعل بصري فوري (نبضة سريعة) — بيثبت إن الضغطة فعلاً
            // وصلت لعنصر الزرار نفسه، بغض النظر عن نتيجة الفاليديشن
            // اللي جوه addToCartFromModal (مفيد جداً للتشخيص)
            console.info("🖱️ تم رصد ضغطة فعلية على زرار أضف للسلة — جاري التنفيذ...");
            _addBtn.style.transform = "scale(0.96)";
            setTimeout(function () {
              _addBtn.style.transform = "";
            }, 120);
            addToCartFromModal(_addBtn.getAttribute("data-item-code"));
          });
        }

        // ── سبينر الكمية (+/-) وتصحيح الكتابة اليدوية ────────────
        _bindQtyStepper();

        // شغّل معرض الصور (صورة واحدة + سلايدشو تلقائي لو أكتر من صورة)
        _setGalleryImages(allImgs.map(function (img) { return img.src; }));

        // open animation
        var backdrop = document.getElementById("drawer-backdrop");
        var drawer = document.getElementById("item-drawer");
        backdrop.style.display = "block";
        requestAnimationFrame(function () {
          backdrop.classList.add("open");
          drawer.classList.add("open");
        });
        document.body.style.overflow = "hidden";
      }

      function closeDrawer() {
        clearInterval(_gallerySlideTimer);
        _gallerySlideTimer = null;
        var backdrop = document.getElementById("drawer-backdrop");
        var drawer = document.getElementById("item-drawer");
        backdrop.classList.remove("open");
        drawer.classList.remove("open");
        setTimeout(function () {
          backdrop.style.display = "none";
          document.body.style.overflow = "";
        }, 320);
      }

      // للتوافق مع الكود القديم
      function openModal(id) { openDrawer(id); }

      /* color card selection */
      function selectModalColor(idx, cardEl) {
        var cards = document.querySelectorAll(".modal-color-card");
        cards.forEach(function (c) {
          c.classList.remove("selected");
        });
        cardEl.classList.add("selected");
        var c = _modalState.colors[idx];
        _modalState.selectedColor = c.name;

        /* update indicator bar */
        var bar = document.getElementById("modal-sel-color-bar");
        var nameEl = document.getElementById("modal-sel-color-name");
        var swatchEl = document.getElementById("modal-sel-swatch");
        if (bar && nameEl && swatchEl) {
          var hex =
            c.hex || COLOR_HEX_MAP[c.code] || _guessHex(c.name) || "#94a3b8";
          swatchEl.style.background = hex;
          nameEl.textContent = "اللون المختار: " + c.name;
          bar.classList.add("visible");
        }

        /* if this color has image(s), play them as a slideshow */
        var cImgs = c.images && c.images.length ? c.images : (c.image ? [c.image] : []);
        if (cImgs.length) {
          _setGalleryImages(cImgs, true); /* كروسفيد سلس بدل القفزة الفورية */
        }
      }

      /* lightbox */
      function openLightbox() {
        var src = _modalState.currentImg;
        if (!src) return;
        var lb = document.getElementById("lightbox");
        var lbImg = document.getElementById("lightbox-img");
        lbImg.src = src;
        lb.classList.add("open");
      }
      function closeLightbox() {
        document.getElementById("lightbox").classList.remove("open");
      }
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") {
          closeLightbox();
          closeDrawer();
          closeModal();
        }
      });

      function openOrderModal(id) {
        openDrawer(id);
        setTimeout(function () {
          var sec = document.querySelector(".modal-order");
          if (sec) sec.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }, 350);
      }

      function closeModal(e) {
        if (e && e.target !== document.getElementById("modal-backdrop")) return;
        document.getElementById("modal-backdrop").classList.remove("open");
        document.body.style.overflow = "";
      }

      /* ── Copy item code to clipboard ── */
      function _copyCode(code) {
        if (!code) return;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard
            .writeText(code)
            .then(function () {
              _showToast("✅ تم نسخ الكود: " + code);
            })
            .catch(function () {
              _fallbackCopy(code);
            });
        } else {
          _fallbackCopy(code);
        }
      }
      function _fallbackCopy(code) {
        var ta = document.createElement("textarea");
        ta.value = code;
        ta.style.position = "fixed";
        ta.style.top = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand("copy");
          _showToast("✅ تم نسخ الكود: " + code);
        } catch (e) {
          _showToast("الكود: " + code);
        }
        document.body.removeChild(ta);
      }

      // ── Cart State ────────────────────────────────────────────────
      var CART = []; // [{code, name, imageUrl, color, colorHex, qty}]

      function _cartKey(code, color) {
        return code + "||" + (color || "");
      }

      // ── سبينر الكمية: زرار +/- بيحترم مضاعف الطقم، وتصحيح تلقائي
      //    لحظي (وقت الخروج من الحقل) لو الرقم المكتوب يدوي أقل من
      //    الحد الأدنى أو مش من مضاعفات الطقم — بدل ما يستنى لحد
      //    ما يدوس "أضف للسلة" ويتفاجئ إن الكمية اتغيرت وقتها بس
      function _bindQtyStepper() {
        var input = document.getElementById("modal-qty");
        var minusBtn = document.getElementById("qty-minus");
        var plusBtn = document.getElementById("qty-plus");
        if (!input) return;

        function _clampQty(raw) {
          var moq = Math.max(1, Number(_modalState.minOrderQty || 1));
          var step = Math.max(1, Number(_modalState.qtyStep || 1));
          var n = parseInt(raw, 10);
          if (isNaN(n) || n < moq) return moq;
          if (step > 1 && n % step !== 0) {
            var nearest = Math.round(n / step) * step;
            return nearest < moq ? moq : nearest;
          }
          return n;
        }

        if (minusBtn) {
          minusBtn.addEventListener("click", function () {
            var step = Math.max(1, Number(_modalState.qtyStep || 1));
            var current = parseInt(input.value, 10);
            if (isNaN(current)) current = Math.max(1, Number(_modalState.minOrderQty || 1));
            input.value = _clampQty(current - step);
          });
        }
        if (plusBtn) {
          plusBtn.addEventListener("click", function () {
            var step = Math.max(1, Number(_modalState.qtyStep || 1));
            var current = parseInt(input.value, 10);
            if (isNaN(current)) current = Math.max(1, Number(_modalState.minOrderQty || 1));
            input.value = _clampQty(current + step);
          });
        }
        // تصحيح لحظي وقت الخروج من الحقل (blur) أو الضغط على Enter —
        // مش وقت كل ضغطة زرار عشان نسيبه يكمل كتابة الرقم براحته
        input.addEventListener("blur", function () {
          var corrected = _clampQty(input.value);
          if (String(corrected) !== String(input.value)) {
            input.value = corrected;
            _flashInvalid(input);
          }
        });
        input.addEventListener("keydown", function (ev) {
          if (ev.key === "Enter") {
            input.blur();
          }
        });
      }

      // ════════════════════════════════════════════════════════════
      //  إضافة صنف للسلة — إعادة بناء كاملة (2026-07-17)
      //  كل خطوة هنا بتسجل نفسها في الكونسول (بادئة 🛒) عشان أي حد
      //  يقدر يتابع بالظبط فين بتوقف العملية لو حصلت مشكلة، من غير
      //  ما يحتاج يدخل الكود تاني.
      // ════════════════════════════════════════════════════════════
      function addToCartFromModal(code) {
        console.log("🛒[1/6] addToCartFromModal بدأ — الكود المُستلم:", code);

        if (!code) {
          console.error("🛒 توقف: مفيش كود صنف اتبعت للدالة أصلاً (code فاضي).");
          _showToast("⚠️ خطأ داخلي: كود الصنف مفقود");
          return;
        }

        try {
          var added = _tryAddItemToCart(code);
          console.log("🛒[6/6] النتيجة النهائية:", added ? "تمت الإضافة ✅" : "اتوقفت الإضافة (شوف اللوج فوق) ⛔");
        } catch (err) {
          console.error("🛒 استثناء غير متوقع جوه addToCartFromModal:", err);
          _showToast("⚠️ حصل خطأ أثناء الإضافة للسلة — جرب تاني أو بلّغ الدعم");
        }
      }

      // بيرجع true لو الصنف اتضاف فعليًا، أو false لو اتوقف بسبب فاليديشن
      function _tryAddItemToCart(code) {
        var _item = PUB.items.find(function (x) {
          return String(x.code || x.id) === String(code);
        });
        console.log("🛒[2/6] البحث عن الصنف في PUB.items:", _item ? "لُقي ✔" : "مش موجود ⚠ (هيتضاف بالكود بس)");

        var name = _item ? (_item.name || "") : code;
        var imageUrl = _item ? (_item.image_url || "") : "";

        var qtyInput = document.getElementById("modal-qty");
        var qty = parseInt((qtyInput || {}).value || "1", 10);
        if (isNaN(qty) || qty < 1) qty = 1;

        var color = _modalState.selectedColor || "";
        console.log("🛒[3/6] الكمية المطلوبة:", qty, "| اللون المختار:", color || "(بدون لون)");

        // ── تحقق 1: أقل كمية للطلب ─────────────────────────────
        var _moq = Math.max(1, Number(_modalState.minOrderQty || 1));
        if (qty < _moq) {
          console.warn("🛒 توقف عند تحقق [أقل كمية]: الكمية", qty, "أقل من الحد الأدنى", _moq);
          _flashInvalid(qtyInput, _moq);
          _showToast("⚠️ أقل كمية للطلب على هذا الصنف: " + _moq);
          return false;
        }

        // ── تحقق 2: الكمية لازم تكون من مضاعفات خطوة الطقم ──────
        var _qStep = Math.max(1, Number(_modalState.qtyStep || 1));
        if (_qStep > 1 && qty % _qStep !== 0) {
          var _nearest = Math.round(qty / _qStep) * _qStep;
          if (_nearest < _moq) _nearest = _moq;
          console.warn("🛒 توقف عند تحقق [مضاعف الطقم]: الكمية", qty, "مش مضاعف لـ", _qStep, "— أقرب قيمة:", _nearest);
          _flashInvalid(qtyInput, _nearest);
          _showToast("⚠️ الكمية لازم تكون من مضاعفات " + _qStep + " — تم التعديل لأقرب مضاعف: " + _nearest);
          return false;
        }

        // ── تحقق 3: اختيار اللون لو الصنف عنده ألوان ────────────
        if (_modalState.colors && _modalState.colors.length > 0 && !color) {
          console.warn("🛒 توقف عند تحقق [اللون]: الصنف عنده", _modalState.colors.length, "لون ولسه محددش لون.");
          _flashInvalid(document.getElementById("modal-color-cards"));
          _showToast("⚠️ من فضلك اختر اللون أولاً");
          return false;
        }

        // ── كل التحققات عدّت — جهّز بيانات اللون وأضف للسلة ─────
        var colorHex = "";
        var colorImage = "";
        if (color) {
          var found = (_modalState.colors || []).find(function (c) {
            return c.name === color;
          });
          if (found) {
            colorHex = found.hex || COLOR_HEX_MAP[found.code] || _guessHex(found.name) || "#94a3b8";
            colorImage = found.image || "";
          }
        }
        var displayImage = colorImage || imageUrl || "";

        var key = _cartKey(code, color);
        var existing = CART.find(function (i) {
          return _cartKey(i.code, i.color) === key;
        });
        if (existing) {
          existing.qty += qty;
          existing.minOrderQty = _moq;
          existing.qtyStep = _qStep;
          console.log("🛒[4/6] الصنف موجود بالفعل في السلة بنفس اللون — تم تجميع الكمية. الإجمالي الآن:", existing.qty);
        } else {
          CART.push({
            code: code,
            name: name,
            imageUrl: displayImage,
            color: color,
            colorHex: colorHex,
            qty: qty,
            minOrderQty: _moq,
            qtyStep: _qStep,
          });
          console.log("🛒[4/6] صف جديد اتضاف للسلة. إجمالي أصناف السلة الآن:", CART.length);
        }

        console.log("🛒[5/6] هيتم استدعاء _updateCartUI() لتحديث الواجهة...");
        _updateCartUI();

        _flashSuccess(document.getElementById("btn-add-to-cart"));
        _showToast("✅ تمت الإضافة: " + name + (color ? " — " + color : ""));
        return true;
      }

      // ── تأثير بصري موحّد لحقل/قسم غير صالح (اهتزاز + حدّ أحمر) ──
      function _flashInvalid(el, correctedValue) {
        if (!el) return;
        el.style.transition = "none";
        el.style.outline = "2px solid var(--danger)";
        el.style.borderRadius = el.style.borderRadius || "8px";
        if (el.animate) {
          el.animate(
            [
              { transform: "translateX(0)" },
              { transform: "translateX(-6px)" },
              { transform: "translateX(6px)" },
              { transform: "translateX(-5px)" },
              { transform: "translateX(5px)" },
              { transform: "translateX(0)" },
            ],
            { duration: 380, easing: "ease-in-out" },
          );
        }
        if (correctedValue !== undefined && "value" in el) el.value = correctedValue;
        setTimeout(function () {
          el.style.outline = "";
        }, 1800);
      }

      // ── تأثير بصري موحّد لنجاح الإضافة على الزرار (من غير ما نمسح الأيقونة) ──
      function _flashSuccess(btn) {
        if (!btn) return;
        var label = btn.querySelector(".btn-add-label");
        var original = label ? label.textContent : btn.textContent;
        if (label) {
          label.textContent = "✅ تمت الإضافة!";
        } else {
          btn.textContent = "✅ تمت الإضافة!";
        }
        btn.classList.add("btn-added-cart");
        setTimeout(function () {
          if (label) {
            label.textContent = original;
          } else {
            btn.innerHTML =
              '<i class="ti ti-shopping-cart" style="font-size:16px;margin-left:6px"></i>أضف للسلة';
          }
          btn.classList.remove("btn-added-cart");
        }, 1500);
      }

      function _updateCartUI() {
        var total = CART.reduce(function (s, i) {
          return s + i.qty;
        }, 0);
        var badge = document.getElementById("cart-badge");
        var btn = document.getElementById("cart-open-btn");
        var label = document.getElementById("cart-btn-label");
        var countLabel = document.getElementById("cart-count-label");
        var footer = document.getElementById("cart-footer");
        var totalEl = document.getElementById("cart-total-items");

        // badge
        if (badge) {
          badge.textContent = total;
          badge.classList.toggle("visible", total > 0);
        }
        if (btn) btn.classList.toggle("has-items", total > 0);
        if (label)
          label.textContent =
            total > 0 ? "السلة (" + CART.length + ")" : "السلة";
        if (countLabel)
          countLabel.textContent =
            total > 0 ? "(" + CART.length + " صنف)" : "(فارغة)";
        if (footer) footer.style.display = total > 0 ? "" : "none";
        if (totalEl)
          totalEl.textContent = CART.length + " صنف — " + total + " قطعة";

        // mobile sticky cart bar
        var mobileBar = document.getElementById("mobile-cart-bar");
        var mobileCount = document.getElementById("mobile-cart-count");
        var mobileSub = document.getElementById("mobile-cart-sub");
        if (mobileBar) {
          mobileBar.classList.toggle("has-items", total > 0);
        }
        if (mobileCount && total > 0) {
          mobileCount.textContent = CART.length + " صنف في السلة";
        }
        if (mobileSub && total > 0) {
          mobileSub.textContent = "إجمالي " + total + " قطعة — اضغط للمراجعة والإرسال";
        }

        _renderCartItems();
      }

      function _renderCartItems() {
        var container = document.getElementById("cart-items-container");
        if (!container) return;

        if (CART.length === 0) {
          container.innerHTML =
            '<div class="cart-empty">' +
            '<div class="cart-empty-icon">🛒</div>' +
            "<p>السلة فارغة<br>ابدأ بإضافة أصناف من الكتالوج</p>" +
            "</div>";
          return;
        }

        container.innerHTML = CART.map(function (item, idx) {
          var imgEl = item.imageUrl
            ? '<img class="cart-item-img" src="' +
              _esc(item.imageUrl) +
              '" loading="lazy" onerror="this.outerHTML=\'<div class=cart-item-img-ph>📦</div>\'">'
            : '<div class="cart-item-img-ph">📦</div>';
          var colorRow = item.color
            ? '<div class="cart-item-color">' +
              '<div class="cart-item-color-dot" style="background:' +
              _esc(item.colorHex || "#94a3b8") +
              '"></div>' +
              _esc(item.color) +
              "</div>"
            : "";
          return (
            '<div class="cart-item" id="cart-item-' +
            idx +
            '">' +
            imgEl +
            '<div class="cart-item-info">' +
            '<div class="cart-item-name-row">' +
            '<div class="cart-item-name">' +
            _esc(item.name) +
            "</div>" +
            '<span class="cart-item-code">' +
            _esc(item.code) +
            "</span>" +
            "</div>" +
            colorRow +
            '<div class="cart-item-qty-row">' +
            '<button class="qty-btn" onclick="cartQty(' +
            idx +
            ',' + -(item.qtyStep || 1) + ')">−</button>' +
            '<span class="qty-num">' +
            item.qty +
            "</span>" +
            '<button class="qty-btn" onclick="cartQty(' +
            idx +
            ',' + (item.qtyStep || 1) + ')">+</button>' +
            '<span style="font-size:11px;color:var(--text3);margin-right:6px">قطعة</span>' +
            "</div></div>" +
            '<button class="cart-item-remove" title="حذف" onclick="cartRemove(' +
            idx +
            ')">✕</button>' +
            "</div>"
          );
        }).join("");
      }

      function cartQty(idx, delta) {
        if (!CART[idx]) return;
        var _moq = Math.max(1, Number(CART[idx].minOrderQty || 1));
        var _newQty = CART[idx].qty + delta;
        if (delta < 0 && _newQty < _moq) {
          _showToast("⚠️ أقل كمية للطلب على هذا الصنف: " + _moq + " — استخدم زر الحذف لإزالته");
          return;
        }
        CART[idx].qty = _newQty;
        if (CART[idx].qty <= 0) CART.splice(idx, 1);
        _updateCartUI();
      }

      function cartRemove(idx) {
        CART.splice(idx, 1);
        _updateCartUI();
      }

      function clearCart() {
        if (!CART.length) return;
        _pubConfirm("هل تريد مسح السلة بالكامل؟", function () {
          CART = [];
          _updateCartUI();
        });
      }

      function openCartPanel() {
        document.getElementById("cart-panel").classList.add("open");
        document.getElementById("cart-overlay").classList.add("open");
        document.body.style.overflow = "hidden";
        _renderCartItems();
      }

      function closeCartPanel() {
        document.getElementById("cart-panel").classList.remove("open");
        document.getElementById("cart-overlay").classList.remove("open");
        document.body.style.overflow = "";
      }

      /* ══════════════════════════════════════════════════════
         إغلاق الشاشات المنبثقة (تفاصيل الصنف / السلة) بالسحب
         باللمس — بيسمح للمستخدم يسحب اللوحة ناحية اليسار (نفس
         اتجاه الاختفاء) عشان يقفلها، بدل ما يضطر يدوس على X
         ══════════════════════════════════════════════════════ */
      function _enableSwipeToClose(panelEl, closeFn) {
        if (!panelEl || panelEl._swipeBound) return;
        panelEl._swipeBound = true;

        var startX = 0,
          startY = 0,
          dragX = 0,
          dragging = false,
          isHorizontal = null;

        panelEl.addEventListener(
          "touchstart",
          function (e) {
            if (e.touches.length !== 1) return;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            dragX = 0;
            dragging = true;
            isHorizontal = null;
            panelEl.style.transition = "none";
          },
          { passive: true }
        );

        panelEl.addEventListener(
          "touchmove",
          function (e) {
            if (!dragging) return;
            var dx = e.touches[0].clientX - startX;
            var dy = e.touches[0].clientY - startY;

            if (isHorizontal === null) {
              isHorizontal = Math.abs(dx) > Math.abs(dy) + 6;
              if (!isHorizontal) {
                dragging = false;
                panelEl.style.transition = "";
                return;
              }
            }
            if (!isHorizontal) return;

            // اللوحة بتختفي ناحية الشمال، فالسحب المسموح بيه بس في
            // نفس الاتجاه ده (dx سالبة)؛ لو سحب بالعكس بنقاومه شوية
            var moved = dx < 0 ? dx : dx * 0.2;
            dragX = moved;
            panelEl.style.transform = "translateX(" + moved + "px)";
            e.preventDefault();
          },
          { passive: false }
        );

        function endDrag() {
          if (!dragging) return;
          dragging = false;
          panelEl.style.transition = "";
          panelEl.style.transform = "";
          var threshold = Math.min(120, panelEl.offsetWidth * 0.28);
          if (dragX < -threshold) closeFn();
        }
        panelEl.addEventListener("touchend", endDrag);
        panelEl.addEventListener("touchcancel", endDrag);
      }

      document.addEventListener("DOMContentLoaded", function () {
        _enableSwipeToClose(document.getElementById("item-drawer"), closeDrawer);
        _enableSwipeToClose(document.getElementById("cart-panel"), closeCartPanel);
      });

      function sendCartWhatsApp() {
        if (!CART.length) return;
        var lines = CART.map(function (item, i) {
          return (
            i +
            1 +
            ". " +
            item.name +
            " (" +
            item.code +
            ")" +
            (item.color ? " — اللون: " + item.color : "") +
            " — الكمية: " +
            item.qty
          );
        });
        var msg =
          "أهلاً " +
          PUB.SHOP_NAME +
          " 👋\n\n" +
          "أريد طلب الأصناف التالية:\n\n" +
          lines.join("\n") +
          "\n\nأرجو التواصل لإتمام الطلب 🙏";
        PUB_WA.send(msg, { source_type: "catalog_public_cart" });
      }

      // ── WhatsApp (kept for backward compat) ──────────────────────
      function sendWhatsApp(itemId, itemName) {
        var qty = (document.getElementById("modal-qty") || {}).value || "1";
        var color = _modalState.selectedColor || "";
        var msg =
          "أهلاً " +
          PUB.SHOP_NAME +
          " 👋\n\n" +
          "أريد طلب المنتج التالي:\n" +
          "• الصنف: " +
          itemName +
          " (" +
          itemId +
          ")\n" +
          "• الكمية: " +
          qty +
          "\n" +
          (color ? "• اللون: " + color + "\n" : "") +
          "\nأرجو التواصل لإتمام الطلب 🙏";
        PUB_WA.send(msg, {
          source_type: "catalog_public_item",
          source_id: itemId,
        });
      }

      // ── Helpers ──────────────────────────────────────────────────
      function _stockStatus(it) {
        var qty = Number(it.pub_qty || 0);
        var minQ = Number(it.min_qty || 0);
        if (qty <= 0) return "out";
        if (minQ > 0 && qty <= minQ) return "low";
        return "available";
      }

      function _groupName(gid) {
        if (!gid) return "";
        var g = PUB.groups.find(function (x) {
          return x.id === gid;
        });
        return g ? g.name : gid;
      }

      function _parseColors(raw) {
        if (!raw) return [];
        try {
          var arr = typeof raw === "string" ? JSON.parse(raw) : raw;
          if (!Array.isArray(arr)) return [];
          return arr.filter(Boolean).map(function (c) {
            if (typeof c === "object" && c.name) {
              var images = Array.isArray(c.images)
                ? c.images.map(String).filter(Boolean)
                : c.image
                  ? [String(c.image)]
                  : [];
              images = images.map(_fixDriveUrl);
              return {
                name: String(c.name),
                code: String(c.code || ""),
                hex: String(c.hex || ""),
                image: images[0] || "",
                images: images,
              };
            }
            return { name: String(c), code: "", hex: "", image: "", images: [] };
          });
        } catch (e) {
          return [];
        }
      }

      function _guessHex(name) {
        var map = {
          أحمر: "#ef4444",
          احمر: "#ef4444",
          أسود: "#1e293b",
          اسود: "#1e293b",
          أبيض: "#f8fafc",
          ابيض: "#f8fafc",
          أزرق: "#3b82f6",
          ازرق: "#3b82f6",
          أخضر: "#22c55e",
          اخضر: "#22c55e",
          أصفر: "#eab308",
          اصفر: "#eab308",
          بني: "#92400e",
          بنى: "#92400e",
          رمادي: "#94a3b8",
          رمادى: "#94a3b8",
          وردي: "#ec4899",
          وردى: "#ec4899",
          بنفسجي: "#8b5cf6",
          بنفسجى: "#8b5cf6",
          كحلي: "#1e3a5f",
          كحلى: "#1e3a5f",
          برتقالي: "#f97316",
          ذهبي: "#f59e0b",
        };
        return map[String(name || "").trim()] || null;
      }

      function _esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function _showToast(msg) {
        var t = document.getElementById("pub-toast");
        if (!t) return;
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(function () {
          t.classList.remove("show");
        }, 2800);
      }

      // ── ملاحظة: كان هنا في الأول listener عام بيمسك أي خطأ JS ويظهر
      // توست تحذير للعميل. اتشال لأن جوجل نفسها بتحمّل سكريبتات داخلية
      // جوه نفس الإطار (حماية/توثيق التطبيق) بترمي أخطاء SyntaxError
      // خاصة بيها مالهاش علاقة بالكتالوج، وكان بيوريها للعميل غلط حتى
      // لو كل حاجة شغالة تمام. الحماية الحقيقية موجودة جوه addToCartFromModal
      // نفسها (try/catch محلي) اللي بيمسك أخطاء فعلية في منطق السلة بس.
      window.addEventListener("error", function (e) {
        console.error("Uncaught error:", e.error || e.message);
      });
    </script>
  </body>
